<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lightboard Touch</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap');
  :root {
    --bg:       #0a0a0f;
    --surface:  #13131c;
    --border:   #1e1e2e;
    --accent:   #e8630a;
    --accent2:  #f0a500;
    --text:     #d4d4e8;
    --dim:      #555570;
    --blackout: #c0392b;
    --singer:   #8e44ad;
    --master:   #1a6a3a;
    --step:     #1a3a6a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  /* ── Remote control overlay (Art-Net master active, Phase 2) ── */
  #remote-banner {
    position: fixed; inset: 0;
    display: none;
    flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px;
    background: rgba(8, 12, 20, 0.88);
    z-index: 1000;
    text-align: center;
    padding: 20px;
  }
  #remote-banner.on { display: flex; }
  #remote-banner .rb-dot {
    width: 18px; height: 18px; border-radius: 50%;
    background: #4db8ff;
    box-shadow: 0 0 14px #4db8ff;
    animation: rb-pulse 1.2s ease-in-out infinite;
  }
  #remote-banner .rb-title {
    font-size: 26px; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: #4db8ff;
  }
  #remote-banner .rb-sub {
    font-size: 12px; color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 0.05em;
  }
  @keyframes rb-pulse {
    0%, 100% { opacity: 1;    transform: scale(1); }
    50%      { opacity: 0.35; transform: scale(0.75); }
  }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }
  body {
    display: flex;
    flex-direction: column;
    height: 100vh;               /* fallback for old engines */
    height: 100dvh;              /* dynamic viewport: excludes browser chrome */
    padding: 6px;
    gap: 5px;
    /* keep the grid clear of gesture-nav bars on phones */
    padding-bottom: calc(6px + env(safe-area-inset-bottom, 0px));
  }
  /* ── Header ── */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  #show-name {
    font-size: 11px;
    font-family: 'Share Tech Mono', monospace;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  #status-row {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  #status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--dim);
    transition: background 0.3s;
  }
  #status-dot.ok    { background: #27ae60; box-shadow: 0 0 5px #27ae60; }
  #status-dot.error { background: var(--blackout); box-shadow: 0 0 6px var(--blackout); }
  #scene-status {
    font-size: 9px;
    font-family: 'Share Tech Mono', monospace;
    color: var(--dim);
    letter-spacing: 0.06em;
  }
  /* ── Scene grid ── */
  #scene-grid {
    display: grid;
    gap: 5px;
    flex: 1;
    align-content: start;
  }
  .scene-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: var(--grid-font, 13px);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 0 6px;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    line-height: 1.2;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s, box-shadow 0.1s;
    user-select: none;
    position: relative;
    overflow: hidden;
  }
  .scene-btn::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .scene-btn:active { opacity: 0.75; }
  .scene-btn.active {
    background: #1a1a2e;
    border-color: var(--accent);
    box-shadow: 0 0 10px rgba(232,99,10,0.45);
    color: #fff;
  }
  .scene-btn.active::before { opacity: 1; }

  /* Action button variants */
  .scene-btn.type-preset {
    background: #241d08;
    border-color: #55471a;
    color: #f0d080;
  }
  .scene-btn.type-blackout {
    background: #2a0a0a;
    border-color: #5a1a1a;
    color: #ff8888;
  }
  .scene-btn.type-blackout.active {
    background: var(--blackout);
    border-color: #e74c3c;
    color: #fff;
    box-shadow: 0 0 12px rgba(192,57,43,0.6);
    animation: pulse-red 1s ease-in-out infinite;
    z-index: 1;
  }
  .scene-btn.type-singer {
    background: #1a0a2a;
    border-color: #4a1a6a;
    color: #cc88ff;
  }
  .scene-btn.type-singer.active {
    background: var(--singer);
    border-color: #aa55dd;
    color: #fff;
    box-shadow: 0 0 10px rgba(142,68,173,0.5);
  }
  .scene-btn.type-master-up,
  .scene-btn.type-master-down {
    background: #0a1a0a;
    border-color: #1a4a1a;
    color: #88cc88;
  }
  .scene-btn.type-singer-up,
  .scene-btn.type-singer-down {
    background: #1a0a2a;
    border-color: #4a1a6a;
    color: #cc88ff;
  }
  .scene-btn.type-tempo {
    background: #0a1a2a;
    border-color: #1a3a6a;
    color: #88bbff;
  }
  .scene-btn.type-tempo.active {
    background: var(--step);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 0 10px rgba(232,99,10,0.45);
  }
  .scene-btn.type-tempo-cancel {
    background: #2a0a0a;
    border-color: #5a1a1a;
    color: #ff8888;
  }
  .scene-btn.type-cycler {
    background: #0a2a1a;
    border-color: #1a5a3a;
    color: #88ddaa;
  }
  .scene-btn.type-cycler.active {
    background: var(--master);
    border-color: #2a9a5a;
    color: #fff;
    box-shadow: 0 0 10px rgba(26,106,58,0.55);
    animation: pulse-green 1.2s ease-in-out infinite;
  }

  @keyframes pulse-green {
    0%,100% { box-shadow: 0 0 9px rgba(39,174,96,0.4); }
    50%      { box-shadow: 0 0 20px rgba(39,174,96,0.8); }
  }

  @keyframes pulse-red {
    0%,100% { box-shadow: 0 0 10px rgba(231,76,60,0.45); background: var(--blackout); transform: scale(1); }
    50%      { box-shadow: 0 0 34px rgba(231,76,60,0.95); background: #ff5540;         transform: scale(1.045); }
  }

  /* ── Per-cell colors (scene auto-color or manual pick) ──
     Declared AFTER the type-* variants so a manual color overrides them. */
  .scene-btn.colored {
    border-color: var(--cell-color);
    background: var(--cell-bg);
  }
  .scene-btn.colored.active {
    border-color: var(--cell-color);
    background: var(--cell-bg-active);
    box-shadow: 0 0 12px var(--cell-glow);
  }

  /* ── Footer / IP ── */
  #footer {
    flex-shrink: 0;
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 0.06em;
  }
  /* ── Kiosk admin gate (5s corner hold → PIN? → nav) ── */
  .gate-backdrop {
    position: fixed; inset: 0; z-index: 1100;   /* above #remote-banner (1000) */
    background: rgba(0,0,0,0.82);
    display: none;
    align-items: center; justify-content: center;
  }
  .gate-backdrop.open { display: flex; }
  .gate-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    width: min(340px, 92vw);
    max-height: 90dvh;
    overflow-y: auto;
  }
  .gate-panel h2 {
    margin: 0 0 12px;
    font-size: 15px; font-weight: 700; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--text); text-align: center;
  }
  #pin-dots {
    display: flex; justify-content: center; gap: 10px; margin-bottom: 14px;
    min-height: 14px;
  }
  #pin-dots span {
    width: 12px; height: 12px; border-radius: 50%;
    border: 1px solid var(--dim); background: transparent;
  }
  #pin-dots span.on { background: var(--accent); border-color: var(--accent); }
  #pin-dots.err span { border-color: #e74c3c; background: #e74c3c; }
  .pin-pad {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  }
  .pin-pad button {
    min-height: 54px;
    background: #1a1a24; border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: 'Rajdhani', sans-serif;
    font-size: 20px; font-weight: 700; cursor: pointer;
  }
  .pin-pad button:active { background: #262636; }
  .pin-pad button.pin-fn { font-size: 13px; color: var(--dim); }
  .nav-menu { display: flex; flex-direction: column; gap: 8px; }
  .nav-menu button {
    min-height: 52px;
    background: #1a1a24; border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: 'Rajdhani', sans-serif;
    font-size: 16px; font-weight: 700; letter-spacing: 0.05em;
    text-transform: uppercase; cursor: pointer; text-align: left;
    padding: 0 16px;
  }
  .nav-menu button:active { background: #262636; }
  .nav-menu button.nav-close { color: var(--dim); text-align: center; }
  /* ── Kiosk toast (small, non-blocking status messages) ── */
  #kiosk-toast {
    position: fixed; left: 50%; bottom: 70px; transform: translateX(-50%) translateY(20px);
    background: var(--surface); border: 1px solid var(--accent);
    color: var(--text); padding: 10px 18px; border-radius: 20px;
    font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 700;
    letter-spacing: 0.03em; box-shadow: 0 4px 18px rgba(0,0,0,0.6);
    opacity: 0; pointer-events: none; transition: opacity 0.2s, transform 0.2s;
    z-index: 1200; max-width: 80vw; text-align: center;
  }
  #kiosk-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  /* ── Quick wash strip (always-visible, single-use chase builder) ── */
  #wash-strip {
    flex-shrink: 0;
    display: flex; flex-direction: column; gap: 4px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 8px;
  }
  .ws-row { display: flex; align-items: center; gap: 6px; }
  .ws-action-row { align-items: stretch; }
  #wash-strip-swatches {
    display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px;
    scrollbar-width: none;
  }
  #wash-strip-swatches::-webkit-scrollbar { display: none; }
  .ws-swatch {
    flex-shrink: 0; width: 34px; height: 34px; border-radius: 50%;
    border: 2px solid var(--border); cursor: pointer;
  }
  .ws-swatch:active { border-color: var(--accent); }
  .ws-settings-label {
    color: var(--dim); font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.05em; flex-shrink: 0;
  }
  .ws-speed-group { display: flex; gap: 4px; flex-shrink: 0; }
  .ws-speed-btn {
    min-width: 46px; min-height: 26px;
    background: #1a1a24; border: 1px solid var(--border); border-radius: 5px;
    color: var(--dim); font-family: 'Rajdhani', sans-serif;
    font-size: 11px; font-weight: 700; letter-spacing: 0.04em;
    cursor: pointer;
  }
  .ws-speed-btn.active { background: var(--accent); border-color: var(--accent); color: #000; }
  .ws-ripple-btn {
    min-height: 26px; padding: 0 10px; margin-left: auto; flex-shrink: 0;
    background: #1a1a24; border: 1px solid var(--border); border-radius: 5px;
    color: var(--dim); font-family: 'Rajdhani', sans-serif;
    font-size: 11px; font-weight: 700; letter-spacing: 0.04em;
    cursor: pointer;
  }
  .ws-ripple-btn.active { background: var(--singer); border-color: #aa55dd; color: #fff; }
  #wash-strip-seq {
    flex: 1; display: flex; gap: 4px; overflow-x: auto; min-height: 44px;
    align-items: center;
  }
  .ws-seq-chip {
    flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%;
    border: 1px solid var(--border); cursor: pointer;
  }
  .ws-controls { display: flex; gap: 6px; flex-shrink: 0; }
  .ws-btn {
    flex: 1; min-width: 56px;
    background: #1a1a24; border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-family: 'Rajdhani', sans-serif;
    font-size: 20px; font-weight: 700; letter-spacing: 0.03em;
    cursor: pointer;
  }
  .ws-btn:active { background: #262636; }
  .ws-btn.ws-off { color: #ff8888; font-size: 15px; }
  /* ── Wash designer (full version — ported from the show board) ── */
  .gate-panel.wash-panel { width: min(760px, 96vw); text-align: left; }
  .gate-panel.wash-panel h2 { text-align: left; }
  /* Corner dual-hold hint (3s reached in a corner: release=edit, hold=admin) */
  #hold-hint {
    position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
    z-index: 1050;                     /* above banner, below gates */
    display: none;
    background: var(--surface); border: 1px solid var(--accent);
    border-radius: 20px; padding: 8px 18px;
    font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 700;
    letter-spacing: 0.04em; color: var(--text); white-space: nowrap;
    box-shadow: 0 2px 14px rgba(0,0,0,0.7);
  }
  #hold-hint.show { display: block; }
  /* Long-press hygiene: this is a control surface — no text selection or
     touch callouts fighting the 3s/5s holds (kiosk chromium + iPad alike) */
  #scene-grid button, .fader-cell, .grid-label, #header, #footer, #wash-strip {
    user-select: none; -webkit-user-select: none; -webkit-touch-callout: none;
  }
  /* ── Grid labels (static, non-interactive text/divider) ── */
  .grid-label {
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-family: 'Rajdhani', sans-serif;
    font-size: var(--grid-font, 13px);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--dim);
    border-bottom: 1px solid var(--border);
    padding: 0 4px;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    user-select: none;
    pointer-events: none;
  }
  /* ── Custom faders ── */
  .fader-cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex;
    padding: 4px;
    gap: 4px;
    position: relative;
    user-select: none;
    touch-action: none;
    overflow: hidden;
  }
  .fader-cell.vert  { flex-direction: column; }
  .fader-cell.horiz { flex-direction: row; align-items: stretch; }
  .fader-head {
    display: flex; align-items: center; justify-content: space-between;
    gap: 4px; flex-shrink: 0; min-width: 0;
  }
  .fader-cell.horiz .fader-head {
    flex-direction: column; justify-content: center; max-width: 34%;
  }
  .fader-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .fader-value {
    font-size: 10px; font-family: 'Share Tech Mono', monospace;
    color: var(--dim); flex-shrink: 0;
  }
  .fader-track {
    position: relative; flex: 1;
    background: #0d0d14;
    border: 1px solid var(--border);
    border-radius: 5px;
    overflow: hidden;
    min-height: 44px; min-width: 44px;
  }
  .fader-fill {
    position: absolute; inset: 0;
    background: var(--accent2);
    opacity: 0.85;
    transform-origin: bottom;
  }
  .fader-cell.horiz .fader-fill { transform-origin: left; }
  .fader-cell.mode-override .fader-fill { background: var(--dim); opacity: 0.5; }
  .fader-cell.mode-override.armed .fader-fill { background: var(--blackout); opacity: 0.9; }
  .fader-cell.mode-override.armed {
    border-color: var(--blackout);
    box-shadow: 0 0 10px rgba(192,57,43,0.55);
  }
  .fader-arm {
    flex-shrink: 0;
    background: #1a1a24; border: 1px solid var(--border); border-radius: 5px;
    color: var(--dim);
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
    padding: 6px 8px;
    cursor: pointer;
  }
  .fader-cell.armed .fader-arm {
    background: var(--blackout); border-color: var(--blackout); color: #fff;
  }
</style>
</head>
<body>
<div id="header">
  <div id="show-name">…</div>
  <div id="status-row">
    <div id="scene-status">— no scene active —</div>
    <div id="status-dot"></div>
  </div>
</div>

<div id="wash-strip">
  <div id="wash-strip-swatches" class="ws-row"></div>
  <div class="ws-row">
    <span class="ws-settings-label">Speed</span>
    <div class="ws-speed-group">
      <button class="ws-speed-btn" data-speed="slow"   onclick="wsSetSpeed('slow')">SLOW</button>
      <button class="ws-speed-btn" data-speed="medium" onclick="wsSetSpeed('medium')">MED</button>
      <button class="ws-speed-btn" data-speed="fast"   onclick="wsSetSpeed('fast')">FAST</button>
    </div>
    <button class="ws-ripple-btn" id="ws-ripple-btn" onclick="wsToggleRipple()" title="Alternating pods run half a step apart">🌊 RIPPLE</button>
  </div>
  <div class="ws-row ws-action-row">
    <div id="wash-strip-seq"></div>
    <div class="ws-controls">
      <button class="ws-btn" onclick="wsPlay()" title="Play built sequence">▶</button>
      <button class="ws-btn" onclick="wsClear()" title="Clear sequence">✕</button>
      <button class="ws-btn ws-off" onclick="wsOff()" title="Wash off">OFF</button>
    </div>
  </div>
</div>
<div id="scene-grid"></div>
<div id="footer">…</div>

<!-- Remote-mode overlay: shown when a master console streams Art-Net at
     this Pi. Blocks all touches (pointer events land on the overlay) so
     local faders/scenes are visibly and physically bypassed. -->
<div id="remote-banner">
  <div class="rb-dot"></div>
  <div class="rb-title">Remote Control Active</div>
  <div class="rb-sub" id="remote-sub">local controls bypassed</div>
</div>

<!-- Kiosk admin gate: opened by a 5s hold in any screen corner. PIN pad
     only shows when config.json has kiosk_pin set. Markup must stay ABOVE
     the script tag (getElementById runs during parse). -->
<div class="gate-backdrop" id="pin-gate">
  <div class="gate-panel">
    <h2>Admin PIN</h2>
    <div id="pin-dots"></div>
    <div class="pin-pad" id="pin-pad"></div>
  </div>
</div>

<div class="gate-backdrop" id="nav-gate">
  <div class="gate-panel">
    <h2>Admin</h2>
    <div class="nav-menu">
      <button onclick="location.href='/'">🎛 Show Board</button>
      <button onclick="location.href='/touch-config'">🔧 Touch Config</button>
      <button onclick="location.href='/library'">📚 Scene Library</button>
      <button onclick="location.href='/editor'">✏️ Scene Editor</button>
      <button onclick="location.href='/settings'">⚙️ Settings</button>
      <button onclick="location.href='/wifi'">📶 WiFi</button>
      <button onclick="kioskCaptureLook()">⭐ Capture Look</button>
      <button class="nav-close" onclick="closeGates()">✕ Back to Show</button>
    </div>
  </div>
</div>

<div class="gate-backdrop" id="wash-designer-gate" onclick="if(event.target===this) closeWash()">
  <div class="gate-panel wash-panel">
    <h2 style="display:flex;align-items:center;gap:8px;">
      <span style="flex:1;">🎨 Wash Designer</span>
      <button onclick="washOff()" style="background:#1a1a24;border:1px solid var(--border);
              border-radius:6px;color:#ff8888;padding:4px 10px;font-size:11px;cursor:pointer;
              text-transform:none;letter-spacing:0;">✕ Wash off</button>
    </h2>
    <div style="display:flex;gap:8px;margin-bottom:12px;">
      <button id="wash-mode-instant" onclick="setWashMode('instant')"
              style="flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);
                     cursor:pointer;font-size:12px;">Instant</button>
      <button id="wash-mode-chase" onclick="setWashMode('chase')"
              style="flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);
                     cursor:pointer;font-size:12px;">Build chase</button>
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
      <span style="font-size:12px;color:var(--dim);min-width:40px;">White</span>
      <input type="range" id="wash-kelvin" min="2200" max="6500" step="50" value="3000"
             style="flex:1;" oninput="washKelvinInput(this.value)" onchange="washKelvinCommit(this.value)">
      <span id="wash-kelvin-val" style="min-width:52px;text-align:right;font-size:12px;
            font-variant-numeric:tabular-nums;">3000K</span>
      <button id="wash-add-white" onclick="washAddWhite()" style="display:none;background:#1a1a24;
              border:1px solid var(--border);border-radius:6px;color:var(--text);padding:4px 8px;
              font-size:11px;cursor:pointer;">+ Add</button>
    </div>
    <div id="wash-swatches" style="display:flex;flex-wrap:wrap;gap:8px;"></div>
    <div id="wash-chase-box" style="display:none;margin-top:14px;">
      <div style="font-size:11px;color:var(--dim);">Sequence — tap colors above to add steps, tap a step to remove it</div>
      <div id="wash-seq" style="display:flex;flex-wrap:wrap;gap:6px;min-height:36px;margin:8px 0;
           padding:6px;border:1px dashed var(--border);border-radius:8px;"></div>
      <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;font-size:12px;color:var(--dim);">
        <label>Hold <input type="number" id="wash-hold" value="1000" min="50" step="50"
               style="width:60px;"> ms</label>
        <label>Fade <input type="number" id="wash-fade" value="400" min="0" step="50"
               style="width:60px;"> ms</label>
        <label style="display:flex;align-items:center;gap:5px;">
          <input type="checkbox" id="wash-tempo" style="width:16px;height:16px;"> Beat sync</label>
        <label style="display:flex;align-items:center;gap:5px;"
               title="Alternating pods run half a step apart so colors roll through the rig">
          <input type="checkbox" id="wash-ripple" style="width:16px;height:16px;"> Ripple ½ step</label>
      </div>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <button onclick="washPlayChase()" style="flex:1;padding:10px;border-radius:8px;
                border:none;background:#27ae60;color:#000;font-size:13px;cursor:pointer;">▶ Play</button>
        <button onclick="washSaveChase()" style="flex:1;padding:10px;border-radius:8px;
                border:1px solid var(--border);background:#1a1a24;color:var(--text);
                font-size:13px;cursor:pointer;">💾 Save to library</button>
      </div>
    </div>
    <button class="nav-close" onclick="closeWash()" style="margin-top:14px;width:100%;">✕ Close</button>
  </div>
</div>

<div id="hold-hint">Release → Edit Scene&nbsp;&nbsp;·&nbsp;&nbsp;Keep holding → Admin</div>

<script src="/static/dialogs.js"></script>
<script src="/static/kiosk_osk.js"></script>
<script>
  let blackoutOn   = false;
  let singerOn     = false;
  let masterLevel  = 1.0;
  let singerLevel  = 1.0;
  let activeScenes = new Set();
  let gridConfig   = null;

  const STEP = 0.1;

  // ── Boot ─────────────────────────────────────────────────────────────
  async function boot() {
    try {
      const res  = await fetch('/api/touch/config');
      gridConfig = await res.json();
      buildGrid();
      initWashStrip();
      await fetchState();
      document.getElementById('status-dot').className = 'ok';
    } catch(e) {
      document.getElementById('status-dot').className = 'error';
    }
    refreshInfo();
  }

  // ── Footer info (IP + show name) — self-scheduling refresh ─────
  const INFO_REFRESH_MS = 15000;
  async function refreshInfo() {
    try {
      const r = await fetch('/api/touch/info');
      const d = await r.json();
      const ipParts = [];
      if (d.ips && d.ips.wlan0) ipParts.push('WiFi: ' + d.ips.wlan0);
      if (d.ips && d.ips.eth0)  ipParts.push('ETH: ' + d.ips.eth0);
      if (!ipParts.length)      ipParts.push('IP: ' + (d.ip || 'unknown'));
      document.getElementById('footer').textContent =
        ipParts.join('  ·  ') + '  ·  ' + d.show_name;
      document.getElementById('show-name').textContent = d.show_name;
    } catch(e) {}
    finally {
      setTimeout(refreshInfo, INFO_REFRESH_MS);
    }
  }

  // ── Build grid from config ────────────────────────────────────────────
  // WYSIWYG: slot index i maps to a fixed grid position (row ⌊i/cols⌋,
  // col i%cols), so cells land exactly where the builder placed them —
  // gaps included. Any cell (fader, scene/action button, or label) can
  // occupy a w×h footprint; slots inside a footprint are skipped
  // defensively if anything is stored there.
  function faderFootprint(idx, def, cols, rows) {
    const col = idx % cols, row = Math.floor(idx / cols);
    const w = Math.max(1, Math.min(def.w || 1, cols - col));
    const h = Math.max(1, Math.min(def.h || 1, rows - row));
    const slots = [];
    for (let dr = 0; dr < h; dr++)
      for (let dc = 0; dc < w; dc++)
        slots.push(idx + dr * cols + dc);
    return { col, row, w, h, slots };
  }

  // {w,h} footprint for any populated cell — a fader's size lives on its
  // shared definition (looked up via `faders`); every other type (scene/
  // action/label) carries its own w/h directly.
  function cellSize(cell, faders) {
    if (!cell) return null;
    if (cell.fader_id) {
      const d = faders[cell.fader_id];
      return d ? { w: d.w || 1, h: d.h || 1 } : { w: 1, h: 1 };
    }
    return { w: cell.w || 1, h: cell.h || 1 };
  }

  function buildGrid() {
    const grid = document.getElementById('scene-grid');
    grid.innerHTML = '';
    const cols   = gridConfig.cols || 2;
    const rows   = gridConfig.rows || 4;
    const faders = {};
    (gridConfig.faders || []).forEach(f => { faders[f.id] = f; });
    const cells = gridConfig.cells || [];
    grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    grid.style.gridTemplateRows    = `repeat(${rows}, 1fr)`;
    grid.style.alignContent        = 'stretch';
    grid.style.setProperty('--grid-font', (gridConfig.font_size || 13) + 'px');

    // Slots covered by any multi-cell footprint (beyond its own anchor slot)
    const covered = new Set();
    cells.forEach((cell, i) => {
      const size = cellSize(cell, faders);
      if (size && (size.w > 1 || size.h > 1))
        faderFootprint(i, size, cols, rows).slots
          .forEach(s => { if (s !== i) covered.add(s); });
    });

    cells.forEach((cell, i) => {
      if (!cell || i >= cols * rows || covered.has(i)) return;
      if (!(cell.scene_id || cell.action || cell.preset_id || cell.fader_id || cell.type === 'label')) return;

      if (cell.fader_id) {
        const def = faders[cell.fader_id];
        if (!def) return;
        const fp = faderFootprint(i, def, cols, rows);
        const el = buildFader(def);
        el.style.gridColumn = (fp.col + 1) + ' / span ' + fp.w;
        el.style.gridRow    = (fp.row + 1) + ' / span ' + fp.h;
        grid.appendChild(el);
        return;
      }

      if (cell.type === 'label') {
        const fp = faderFootprint(i, cell, cols, rows);
        const lbl = document.createElement('div');
        lbl.className = 'grid-label';
        lbl.style.gridColumn = (fp.col + 1) + ' / span ' + fp.w;
        lbl.style.gridRow    = (fp.row + 1) + ' / span ' + fp.h;
        if (cell.font_size) lbl.style.fontSize = cell.font_size + 'px';
        if (cell.color) lbl.style.color = cell.color;
        lbl.textContent = cell.label || '';
        grid.appendChild(lbl);
        return;
      }

      const fp = faderFootprint(i, cell, cols, rows);
      const btn = document.createElement('button');
      btn.style.gridColumn = (fp.col + 1) + ' / span ' + fp.w;
      btn.style.gridRow    = (fp.row + 1) + ' / span ' + fp.h;
      if (cell.font_size) btn.style.fontSize = cell.font_size + 'px';
      btn.className = 'scene-btn';

      // Manual color beats scene auto-color beats default/type styling
      const cc = cell.color || cell.auto_color;
      if (cc) {
        btn.classList.add('colored');
        btn.style.setProperty('--cell-color',     cc);
        btn.style.setProperty('--cell-bg',        cc + '1a');   // ~10% wash
        btn.style.setProperty('--cell-bg-active', cc + '33');   // ~20% when lit
        btn.style.setProperty('--cell-glow',      cc + '80');   // 50% glow
      }
      btn.id = cell.scene_id ? 'scene-' + cell.scene_id :
               cell.preset_id ? 'preset-' + cell.preset_id : 'action-' + cell.action;

      if (cell.action) {
        btn.classList.add('type-' + cell.action);
        btn.textContent = cell.label || actionLabel(cell.action);
        btn.dataset.baseLabel = btn.textContent;
        btn.onclick = () => doAction(cell.action, btn);
      } else if (cell.preset_id) {
        // Presets are momentary recalls (no persistent lit state)
        btn.classList.add('type-preset');
        btn.textContent = cell.label || cell.name || cell.preset_id;
        btn.onclick = () => recallPreset(cell.preset_id, btn);
      } else {
        btn.textContent = cell.label || cell.name || cell.scene_id;
        btn.onclick = () => toggleScene(cell.scene_id);
        attachSceneHold(btn, cell.scene_id);   // 3s hold -> scene editor
      }
      grid.appendChild(btn);
    });
  }

  function actionLabel(action) {
    const labels = {
      'blackout':    '⬛ Blackout',
      'singer':      '🎤 Singer',
      'master-up':   '🔆 Brighter',
      'master-down': '🔅 Dimmer',
      'singer-up':   '🎤 + Level',
      'singer-down': '🎤 - Level',
      'tempo':        '👆 Tap',
      'tempo-cancel': '✕ Tempo',
      'cycler':       '🔁 Cycler',
    };
    return labels[action] || action;
  }

  // ── Custom faders ─────────────────────────────────────────────────────
  const faderState = {};   // id -> {level, armed, dragging, lastSent, timer}

  function buildFader(def) {
    const vert = (def.orientation || 'vertical') === 'vertical';
    const el = document.createElement('div');
    el.className = 'fader-cell ' + (vert ? 'vert' : 'horiz') +
                   ' mode-' + (def.mode || 'limit');
    el.id = 'fader-' + def.id;
    // placement + span are set by buildGrid (WYSIWYG footprint)

    const st = faderState[def.id] = faderState[def.id] ||
      { level: (def.level !== undefined ? def.level : 1.0), armed: false,
        dragging: false, lastSent: 0, timer: null };

    const head = document.createElement('div');
    head.className = 'fader-head';
    head.innerHTML =
      '<span class="fader-label">' + (def.label || 'FADER') + '</span>' +
      '<span class="fader-value" id="fader-val-' + def.id + '"></span>';
    const track = document.createElement('div');
    track.className = 'fader-track';
    const fill = document.createElement('div');
    fill.className = 'fader-fill';
    fill.id = 'fader-fill-' + def.id;
    track.appendChild(fill);

    el.appendChild(head);
    el.appendChild(track);

    if (def.mode === 'override' && !def.system) {
      const arm = document.createElement('button');
      arm.className = 'fader-arm';
      arm.textContent = 'ARM';
      arm.onclick = (e) => { e.stopPropagation(); toggleArm(def.id); };
      el.appendChild(arm);
    }

    track.addEventListener('pointerdown', e => {
      e.preventDefault();
      track.setPointerCapture(e.pointerId);
      st.dragging = true;
      dragFader(def, track, e, vert);
    });
    track.addEventListener('pointermove', e => {
      if (st.dragging) dragFader(def, track, e, vert);
    });
    const end = () => {
      if (!st.dragging) return;
      st.dragging = false;
      sendFaderLevel(def.id, st.level, true);   // final flush
    };
    track.addEventListener('pointerup', end);
    track.addEventListener('pointercancel', end);

    paintFader(def.id);
    return el;
  }

  function dragFader(def, track, e, vert) {
    const r = track.getBoundingClientRect();
    let lv = vert ? 1 - (e.clientY - r.top) / r.height
                  : (e.clientX - r.left) / r.width;
    lv = Math.max(0, Math.min(1, lv));
    faderState[def.id].level = lv;
    paintFader(def.id);
    sendFaderLevel(def.id, lv, false);
  }

  const FADER_SEND_MS = 50;   // ~20 posts/sec max while dragging
  function sendFaderLevel(id, level, final) {
    const st  = faderState[id];
    const now = Date.now();
    if (!final && now - st.lastSent < FADER_SEND_MS) {
      // trailing send so the last drag position always lands
      clearTimeout(st.timer);
      st.timer = setTimeout(() => sendFaderLevel(id, st.level, true), FADER_SEND_MS);
      return;
    }
    clearTimeout(st.timer);
    st.lastSent = now;
    fetch('/api/touch/fader/' + id + '/level', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({level: level})
    }).catch(() => {});
  }

  async function toggleArm(id) {
    const st = faderState[id];
    st.armed = !st.armed;
    paintFader(id);
    try {
      await fetch('/api/touch/fader/' + id + '/arm', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({armed: st.armed})
      });
    } catch(e) {}
  }

  function paintFader(id) {
    const st   = faderState[id];
    const cell = document.getElementById('fader-' + id);
    const fill = document.getElementById('fader-fill-' + id);
    const val  = document.getElementById('fader-val-' + id);
    if (!st || !cell || !fill) return;
    const vert = cell.classList.contains('vert');
    fill.style.transform = vert ? 'scaleY(' + st.level + ')'
                                : 'scaleX(' + st.level + ')';
    cell.classList.toggle('armed', !!st.armed);
    if (val) val.textContent = Math.round(st.level * 100) + '%';
  }

  // ── Actions ───────────────────────────────────────────────────────────
  async function doAction(action, btn) {
    try {
      if (action === 'blackout') {
        await fetch('/api/blackout', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({mode: 'full'})
        });
        blackoutOn = !blackoutOn;
        btn.classList.toggle('active', blackoutOn);

      } else if (action === 'singer') {
        singerOn = !singerOn;
        await fetch('/api/singer/mode', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({enabled: singerOn})
        });
        btn.classList.toggle('active', singerOn);

      } else if (action === 'master-up') {
        masterLevel = Math.min(1.0, Math.round((masterLevel + STEP) * 10) / 10);
        await fetch('/api/master', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({level: masterLevel})
        });
        flashBtn(btn);

      } else if (action === 'master-down') {
        masterLevel = Math.max(0.0, Math.round((masterLevel - STEP) * 10) / 10);
        await fetch('/api/master', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({level: masterLevel})
        });
        flashBtn(btn);

      } else if (action === 'singer-up') {
        singerLevel = Math.min(1.0, Math.round((singerLevel + STEP) * 10) / 10);
        await fetch('/api/singer/level', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({level: singerLevel})
        });
        flashBtn(btn);

      } else if (action === 'singer-down') {
        singerLevel = Math.max(0.0, Math.round((singerLevel - STEP) * 10) / 10);
        await fetch('/api/singer/level', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({level: singerLevel})
        });
        flashBtn(btn);

      } else if (action === 'tempo') {
        await fetch('/api/tempo/tap', { method: 'POST' });
        flashBtn(btn);

      } else if (action === 'tempo-cancel') {
        await fetch('/api/tempo/cancel', { method: 'POST' });
        flashBtn(btn);

      } else if (action === 'cycler') {
        await fetch('/api/cycler/toggle', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({})
        });
        fetchState();   // reflect new active state promptly

      } else if (action === 'wash-open') {
        openWash();

      } else if (action === 'clear-all') {
        await fetch('/api/clear-all', { method: 'POST' });
        toast('Cleared — all layers stopped');
        fetchState();
      }
    } catch(e) {}
  }

  function flashBtn(btn) {
    btn.classList.add('active');
    setTimeout(() => btn.classList.remove('active'), 200);
  }

  // ── Preset recall (momentary) ─────────────────────────────────────────
  async function recallPreset(id, btn) {
    try {
      const r = await fetch('/api/preset/' + id + '/recall', { method: 'POST' });
      const d = await r.json();
      if (!d.ok) { alert('Recall failed: ' + (d.error || '')); return; }
      flashBtn(btn);
      fetchState();   // reflect the recalled scenes/levels promptly
    } catch (e) {}
  }

  // ── Toggle scene ──────────────────────────────────────────────────────
  async function toggleScene(id) {
    try {
      if (activeScenes.has(id)) {
        await fetch('/api/stop/' + id, { method: 'POST' });
        activeScenes.delete(id);
      } else {
        await fetch('/api/scene/' + id, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({})
        });
        activeScenes.add(id);
      }
      updateSceneButtons();
    } catch(e) {}
  }

  function updateSceneButtons() {
    document.querySelectorAll('.scene-btn[id^="scene-"]').forEach(btn => {
      const id = btn.id.replace('scene-', '');
      btn.classList.toggle('active', activeScenes.has(id));
    });
    const status = document.getElementById('scene-status');
    status.textContent = activeScenes.size
      ? Array.from(activeScenes).length + ' active'
      : '— no scene active —';
  }

  // ── Poll state ────────────────────────────────────────────────────────
  async function fetchState() {
    try {
      const res  = await fetch('/api/state');
      const data = await res.json();
      activeScenes = new Set(
        (data.scenes || []).filter(s => s && s.id).map(s => s.id)
      );
      blackoutOn  = !!(data.blackout_mode && data.blackout_blend > 0.5);
      masterLevel = data.master_level !== undefined ? data.master_level : masterLevel;
      singerLevel = data.singer_level  !== undefined ? data.singer_level  : singerLevel;
      singerOn    = data.singer_mode === true;
      updateSceneButtons();
      // Sync action button states
      const bo = document.querySelector('.type-blackout');
      if (bo) bo.classList.toggle('active', blackoutOn);
      const so = document.querySelector('.type-singer');
      if (so) so.classList.toggle('active', singerOn);

      // Tempo button: show BPM and light up when a tempo is live
      const t   = data.tempo || {};
      const tEl = document.getElementById('action-tempo');
      if (tEl) {
        const base = tEl.dataset.baseLabel || '👆 Tap';
        if (t.active && t.bpm) {
          tEl.classList.add('active');
          tEl.textContent = '👆 ' + Math.round(t.bpm);
        } else if (t.tapping && t.preview_bpm) {
          tEl.classList.remove('active');
          tEl.textContent = '👆 ' + Math.round(t.preview_bpm) + '…';
        } else {
          tEl.classList.remove('active');
          tEl.textContent = base;
        }
      }
      // Cycler button: active while running
      const cEl = document.getElementById('action-cycler');
      if (cEl) cEl.classList.toggle('active', !!(data.cycler && data.cycler.active));

      // Custom faders: follow server state unless actively dragging
      (data.faders || []).forEach(f => {
        const st = faderState[f.id];
        if (!st || st.dragging) return;
        st.level = f.level;
        st.armed = f.armed;
        paintFader(f.id);
      });

      // Remote mode (Phase 2): full-screen banner while a master console
      // owns the rig; the overlay also swallows all touches.
      const rb = document.getElementById('remote-banner');
      if (rb) {
        const rem = data.remote || {};
        rb.classList.toggle('on', !!rem.active);
        if (rem.active) {
          const sub = document.getElementById('remote-sub');
          if (sub) sub.textContent = 'local controls bypassed — master: '
                                     + (rem.source || 'unknown');
        }
      }
    } catch(e) {}
  }

  setInterval(fetchState, 2000);

  // Poll for config reload signal
  let lastReloadTs = 0;
  async function checkReload() {
    try {
      const r = await fetch('/api/touch/reload');
      const d = await r.json();
      if (d.ts && d.ts !== lastReloadTs && lastReloadTs !== 0) {
        location.reload();
      }
      lastReloadTs = d.ts || 0;
    } catch(e) {}
  }
  setInterval(checkReload, 3000);

  // ── Kiosk admin gate ──────────────────────────────────────────────────
  // 5-second hold in any screen corner opens the gate: PIN pad if the Pi
  // has kiosk_pin configured, straight to the nav menu otherwise. The
  // corner hit-test rides on a document-level listener so there are no
  // dead zones stealing touches from grid buttons — a hold that matures
  // swallows the release-click via gateSuppress.
  const CORNER_PX   = 90;      // corner hit zone (px from each corner)
  const HOLD_MS     = 5000;    // admin gesture: 5s per design
  const EDIT_HOLD_MS = 3000;   // scene-button hold -> editor
  const HOLD_SLOP   = 20;      // px of movement that cancels a hold
  let gateTimer     = null;
  let gateSuppress  = false;   // swallow the click after a matured hold
  let pinEntry      = '';
  let gateTarget    = '';      // where a successful PIN goes ('' = nav menu)

  function gatesOpen() {
    return document.getElementById('pin-gate').classList.contains('open') ||
           document.getElementById('nav-gate').classList.contains('open');
  }

  function showHoldHint(on) {
    document.getElementById('hold-hint').classList.toggle('show', !!on);
  }

  // This is a control surface: no context menus fighting the 3s/5s holds
  document.addEventListener('contextmenu', e => e.preventDefault());

  function inCorner(x, y) {
    const w = window.innerWidth, h = window.innerHeight;
    const nearX = x <= CORNER_PX || x >= w - CORNER_PX;
    const nearY = y <= CORNER_PX || y >= h - CORNER_PX;
    return nearX && nearY;
  }

  // ── 3s scene-button hold -> editor ────────────────────────────────────
  // Outside a corner: fires at 3s. Inside a corner both holds arm on the
  // same press — at 3s a hint appears; releasing before 5s goes to the
  // editor, reaching 5s lets the admin hold win (openGate hides the hint
  // and the release handler sees the gate open and stands down).
  function attachSceneHold(btn, sceneId) {
    btn.addEventListener('pointerdown', e => {
      if (gatesOpen()) return;
      const sx = e.clientX, sy = e.clientY;
      const corner = inCorner(sx, sy);
      let editorArmed = false;
      const t = setTimeout(() => {
        if (corner) { editorArmed = true; showHoldHint(true); }
        else        { gateSuppress = true; navigateEditor(sceneId); }
      }, EDIT_HOLD_MS);
      const move = ev => {
        if (Math.hypot(ev.clientX - sx, ev.clientY - sy) > HOLD_SLOP) cleanup();
      };
      const up = () => {
        if (editorArmed && !gatesOpen()) {
          gateSuppress = true;
          navigateEditor(sceneId);
        }
        cleanup();
      };
      const cleanup = () => {
        clearTimeout(t);
        showHoldHint(false);
        window.removeEventListener('pointermove', move);
        window.removeEventListener('pointerup', up);
        window.removeEventListener('pointercancel', cleanup);
      };
      window.addEventListener('pointermove', move);
      window.addEventListener('pointerup', up);
      window.addEventListener('pointercancel', cleanup);
    });
  }

  async function navigateEditor(sceneId) {
    const dest = '/editor/' + sceneId;
    let required = false;
    try {
      const r = await fetch('/api/touch/unlock');
      required = (await r.json()).pin_required;
    } catch (e) {}
    if (required) {
      gateTarget = dest;
      pinEntry = ''; paintPin(); buildPinPad();
      document.getElementById('pin-gate').classList.add('open');
    } else {
      location.href = dest;
    }
  }

  document.addEventListener('pointerdown', e => {
    if (!inCorner(e.clientX, e.clientY)) return;
    if (gatesOpen()) return;
    const sx = e.clientX, sy = e.clientY;
    clearTimeout(gateTimer);
    gateTimer = setTimeout(() => {
      gateSuppress = true;
      // A 5s press often releases with NO click; don't let the swallow linger
      // and eat the user's first real menu tap — auto-clear if unused.
      setTimeout(() => { gateSuppress = false; }, 700);
      openGate();
    }, HOLD_MS);
    const move = ev => {
      if (Math.hypot(ev.clientX - sx, ev.clientY - sy) > HOLD_SLOP) cancel();
    };
    const cancel = () => {
      clearTimeout(gateTimer);
      document.removeEventListener('pointermove', move);
      document.removeEventListener('pointerup', cancel);
      document.removeEventListener('pointercancel', cancel);
    };
    document.addEventListener('pointermove', move);
    document.addEventListener('pointerup', cancel);
    document.addEventListener('pointercancel', cancel);
  });
  // A matured hold releases over whatever button sat under the finger —
  // capture-phase swallow so that button doesn't fire.
  document.addEventListener('click', e => {
    if (gateSuppress) { gateSuppress = false; e.stopPropagation(); e.preventDefault(); }
  }, true);

  async function openGate() {
    showHoldHint(false);   // admin wins the corner dual-hold
    gateTarget = '';
    let required = false;
    try {
      const r = await fetch('/api/touch/unlock');
      required = (await r.json()).pin_required;
    } catch (e) {}
    if (required) { pinEntry = ''; paintPin(); buildPinPad();
                    document.getElementById('pin-gate').classList.add('open'); }
    else          { document.getElementById('nav-gate').classList.add('open'); }
  }

  function closeGates() {
    document.getElementById('pin-gate').classList.remove('open');
    document.getElementById('nav-gate').classList.remove('open');
    pinEntry = '';
    gateTarget = '';
  }

  // ── Capture Look (admin menu) ─────────────────────────────────────────
  // Snapshots the live scene/level composition as a recallable preset via
  // the existing capture API. The formDialog (dialogs.js) uses real DOM
  // inputs so the kiosk OSK can serve the name field. Assign the new
  // preset to a grid button in Touch Config to recall it from the show.
  async function kioskCaptureLook() {
    const v = await formDialog({
      title: 'Capture current look',
      hint: 'Saves the live scenes and levels as a recallable preset',
      ok: 'Save',
      fields: [{ key: 'name', label: 'Name', value: '', placeholder: 'Preset' }],
    });
    if (v === null) return;
    try {
      const r = await fetch('/api/presets', { method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ capture: true, name: v.name || 'Preset' }) });
      const d = await r.json();
      if (!d.ok) { alert('Capture failed: ' + (d.error || '')); return; }
      closeGates();
    } catch (e) { alert('Capture failed'); }
  }

  function buildPinPad() {
    const pad = document.getElementById('pin-pad');
    if (pad.childElementCount) return;   // build once
    const keys = ['1','2','3','4','5','6','7','8','9','CLR','0','OK'];
    keys.forEach(k => {
      const b = document.createElement('button');
      b.textContent = k;
      if (k === 'CLR') b.classList.add('pin-fn');
      b.onclick = () => {
        if (k === 'OK')  { tryUnlock(); return; }
        if (k === 'CLR') { pinEntry = ''; paintPin(); return; }
        if (pinEntry.length >= 8) return;
        pinEntry += k;
        paintPin();
      };
      pad.appendChild(b);
    });
  }

  let unlockBusy = false;
  async function tryUnlock() {
    if (unlockBusy || !pinEntry) return;
    unlockBusy = true;
    try {
      const r = await fetch('/api/touch/unlock', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ pin: pinEntry }),
      });
      const d = await r.json();
      if (d.ok) {
        const dest = gateTarget;      // capture before closeGates resets it
        closeGates();
        if (dest) location.href = dest;
        else document.getElementById('nav-gate').classList.add('open');
      } else {
        flashPinError();
      }
    } catch (e) {}
    unlockBusy = false;
  }

  function paintPin() {
    const dots = document.getElementById('pin-dots');
    dots.classList.remove('err');
    dots.innerHTML = '';
    for (let i = 0; i < pinEntry.length; i++) {
      const s = document.createElement('span');
      s.className = 'on';
      dots.appendChild(s);
    }
  }

  function flashPinError() {
    const dots = document.getElementById('pin-dots');
    dots.classList.add('err');
    setTimeout(() => { pinEntry = ''; paintPin(); }, 500);
  }

  // Tap outside the panel closes either gate (matches config-page modals)
  ['pin-gate', 'nav-gate'].forEach(id => {
    document.getElementById(id).addEventListener('click', function (e) {
      if (e.target === this) closeGates();
    });
  });

  // ── Toast (small, non-blocking status messages) ────────────────────────
  function toast(msg) {
    let t = document.getElementById('kiosk-toast');
    if (!t) {
      t = document.createElement('div');
      t.id = 'kiosk-toast';
      document.body.appendChild(t);
    }
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._hideTimer);
    t._hideTimer = setTimeout(() => t.classList.remove('show'), 2400);
  }

  // ── Shared palette cache + color preview helpers (wash strip + designer) ─
  let _kioskPalette = null;
  async function ensurePalette() {
    if (_kioskPalette) return;
    try { _kioskPalette = await (await fetch('/api/palette')).json(); }
    catch (e) { _kioskPalette = { colors: [] }; }
  }
  function previewCss(c) {
    const rec = (c && c.recipes) || {};
    if (rec.rgb) return `rgb(${rec.rgb.r||0},${rec.rgb.g||0},${rec.rgb.b||0})`;
    const r6 = rec.rgbawuv || rec.rgblauv || {};
    const r=r6.r||0,g=r6.g||0,b=r6.b||0,a=r6.a||0,w=r6.w||0,l=r6.l||0,uv=r6.uv||0;
    return `rgb(${Math.min(255,r+Math.round(a*.8)+Math.round(w*.6))},`+
           `${Math.min(255,g+Math.round(l*.9)+Math.round(a*.4)+Math.round(w*.6))},`+
           `${Math.min(255,b+Math.round(uv*.3)+Math.round(w*.6))})`;
  }
  function kelvinPreviewRGB(k){
    const t=k/100; let r,g,b;
    r = t<=66 ? 255 : Math.min(255,Math.max(0,329.7*Math.pow(t-60,-0.1332)));
    g = t<=66 ? Math.min(255,Math.max(0,99.47*Math.log(t)-161.1))
              : Math.min(255,Math.max(0,288.1*Math.pow(t-60,-0.0755)));
    b = t>=66 ? 255 : (t<=19 ? 0 : Math.min(255,Math.max(0,138.5*Math.log(t-10)-305.0)));
    return {r:Math.round(r),g:Math.round(g),b:Math.round(b)};
  }

  // ── Quick wash strip — always visible, single-use chase builder ────────
  // Tap swatches to build a step sequence, Play fires it through /api/wash
  // at the chosen speed preset (no save, no numeric hold/fade — that's what
  // the full Wash Designer is for). Which colors show here is configured
  // in Touch Config; gridConfig.wash_strip_colors carries the saved list.
  let wsSwatchColors = [];
  let wsSeq = [];
  let wsSpeed = 'medium';
  let wsRippleOn = false;
  const WS_SPEED_PRESETS = {
    slow:   { hold_ms: 3000, fade_ms: 1200 },
    medium: { hold_ms: 1200, fade_ms: 500  },
    fast:   { hold_ms: 500,  fade_ms: 250  },
  };

  async function initWashStrip() {
    await ensurePalette();
    const all = (_kioskPalette && _kioskPalette.colors) || [];
    const ids = (gridConfig && gridConfig.wash_strip_colors) || [];
    wsSwatchColors = ids.length
      ? ids.map(id => all.find(c => c.id === id)).filter(Boolean)
      : all.filter(c => c.id !== 'off').slice(0, 10);
    renderWashStripSwatches();
    renderWashStripSeq();
    wsSetSpeed(wsSpeed);
  }
  function renderWashStripSwatches() {
    const box = document.getElementById('wash-strip-swatches');
    box.innerHTML = wsSwatchColors.map(c =>
      `<div class="ws-swatch" title="${c.name}" style="background:${previewCss(c)}" onclick="wsAdd('${c.id}')"></div>`
    ).join('');
  }
  function wsSetSpeed(speed) {
    wsSpeed = speed;
    document.querySelectorAll('.ws-speed-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.speed === speed));
  }
  function wsToggleRipple() {
    wsRippleOn = !wsRippleOn;
    document.getElementById('ws-ripple-btn').classList.toggle('active', wsRippleOn);
  }
  function wsAdd(pid) {
    const c = wsSwatchColors.find(x => x.id === pid);
    if (!c) return;
    wsSeq.push({ palette_id: pid, css: previewCss(c) });
    renderWashStripSeq();
  }
  function renderWashStripSeq() {
    const box = document.getElementById('wash-strip-seq');
    if (!wsSeq.length) {
      box.innerHTML = '<span style="font-size:10px;color:var(--dim);">tap colors to build a chase</span>';
      return;
    }
    box.innerHTML = wsSeq.map((s,i) =>
      `<div class="ws-seq-chip" style="background:${s.css}" title="Tap to remove" onclick="wsRemove(${i})"></div>`
    ).join('');
  }
  function wsRemove(i) { wsSeq.splice(i,1); renderWashStripSeq(); }
  function wsClear() { wsSeq = []; renderWashStripSeq(); }
  async function wsPlay() {
    if (!wsSeq.length) { toast('Tap a color first'); return; }
    try {
      const preset = WS_SPEED_PRESETS[wsSpeed] || WS_SPEED_PRESETS.medium;
      const body = wsSeq.length === 1
        ? { mode:'palette', palette_id: wsSeq[0].palette_id, launch_fade:400 }
        : { steps: wsSeq.map(s => ({ mode:'palette', palette_id:s.palette_id })),
            hold_ms: preset.hold_ms, fade_ms: preset.fade_ms,
            phase_offset: wsRippleOn, launch_fade:400 };
      const r = await fetch('/api/wash', { method:'POST',
        headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
      const d = await r.json();
      if (!(d && d.ok)) toast('Wash failed: ' + (d && d.error || 'error'));
    } catch (e) { toast('Wash failed'); }
  }
  async function wsOff() {
    try {
      await fetch('/api/wash', { method:'POST',
        headers:{'Content-Type':'application/json'}, body: JSON.stringify({off:true}) });
    } catch (e) {}
    wsClear();
  }

  // ── Wash Designer (full version, ported from the show board) ───────────
  // Instant mode: tap a swatch and every wash-capable fixture paints that
  // color live, layered over running scenes; playing any other scene makes
  // the wash evaporate. Chase mode: taps build a step sequence played as an
  // ephemeral chase, or saved to the library for keeps.
  let washMode = 'instant';
  let washSeq  = [];   // [{spec:{mode,...}, css, label}]
  let _washLastLive = 0;

  async function openWash() {
    await ensurePalette();
    renderWashSwatches();
    setWashMode(washMode);
    document.getElementById('wash-designer-gate').classList.add('open');
  }
  function closeWash() { document.getElementById('wash-designer-gate').classList.remove('open'); }

  function setWashMode(m) {
    washMode = m;
    const inst = document.getElementById('wash-mode-instant');
    const chs  = document.getElementById('wash-mode-chase');
    inst.style.background = m==='instant' ? 'var(--accent)' : '#1a1a24';
    inst.style.color      = m==='instant' ? '#000' : 'var(--text)';
    chs.style.background  = m==='chase'   ? 'var(--accent)' : '#1a1a24';
    chs.style.color       = m==='chase'   ? '#000' : 'var(--text)';
    document.getElementById('wash-chase-box').style.display = m==='chase' ? '' : 'none';
    document.getElementById('wash-add-white').style.display = m==='chase' ? '' : 'none';
    if (m==='chase') renderWashSeq();
  }
  function renderWashSwatches() {
    const box = document.getElementById('wash-swatches');
    let html = '';
    for (const c of ((_kioskPalette && _kioskPalette.colors) || [])) {
      if (c.id === 'off') continue;
      html += `<div onclick="washPick('${c.id}')" style="width:56px;cursor:pointer;text-align:center;">`+
        `<div style="width:42px;height:42px;border-radius:50%;margin:0 auto;`+
        `border:3px solid transparent;background:${previewCss(c)};"></div>`+
        `<div style="font-size:9px;color:var(--dim);margin-top:2px;line-height:1.1;">${c.name}</div></div>`;
    }
    box.innerHTML = html;
  }
  async function postWash(body) {
    try {
      const r = await fetch('/api/wash', {method:'POST',
        headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
      return await r.json();
    } catch (e) { return {ok:false}; }
  }
  function washPick(pid) {
    const c = ((_kioskPalette && _kioskPalette.colors) || []).find(x => x.id===pid);
    if (washMode === 'chase') {
      washSeq.push({spec:{mode:'palette', palette_id:pid},
                    css: previewCss(c||{}), label: c ? c.name : pid});
      renderWashSeq();
    } else {
      postWash({mode:'palette', palette_id:pid, launch_fade:400});
    }
  }
  function washKelvinInput(v) {
    document.getElementById('wash-kelvin-val').textContent = v + 'K';
    if (washMode !== 'instant') return;
    const now = Date.now();
    if (now - _washLastLive > 250) {
      _washLastLive = now;
      postWash({mode:'kelvin', kelvin: parseInt(v), launch_fade:200});
    }
  }
  function washKelvinCommit(v) {
    if (washMode === 'instant') postWash({mode:'kelvin', kelvin: parseInt(v), launch_fade:200});
  }
  function washAddWhite() {
    const k = parseInt(document.getElementById('wash-kelvin').value);
    const c = kelvinPreviewRGB(k);
    washSeq.push({spec:{mode:'kelvin', kelvin:k},
                  css:`rgb(${c.r},${c.g},${c.b})`, label:k+'K'});
    renderWashSeq();
  }
  function renderWashSeq() {
    const box = document.getElementById('wash-seq');
    if (!washSeq.length) {
      box.innerHTML = '<span style="font-size:11px;color:var(--dim);align-self:center;">(empty)</span>';
      return;
    }
    box.innerHTML = washSeq.map((s,i) =>
      `<div onclick="washSeqRemove(${i})" title="Tap to remove" style="cursor:pointer;text-align:center;">`+
      `<div style="width:30px;height:30px;border-radius:50%;background:${s.css};`+
      `border:2px solid var(--border);"></div>`+
      `<div style="font-size:8px;color:var(--dim);max-width:36px;overflow:hidden;`+
      `text-overflow:ellipsis;white-space:nowrap;">${i+1}·${s.label}</div></div>`).join('');
  }
  function washSeqRemove(i) { washSeq.splice(i,1); renderWashSeq(); }
  function washChaseBody() {
    return {steps: washSeq.map(s=>s.spec),
            hold_ms: parseInt(document.getElementById('wash-hold').value)||1000,
            fade_ms: parseInt(document.getElementById('wash-fade').value)||0,
            tempo_sync: document.getElementById('wash-tempo').checked,
            phase_offset: document.getElementById('wash-ripple').checked,
            launch_fade: 400};
  }
  async function washPlayChase() {
    if (!washSeq.length) { toast('Add at least one color step'); return; }
    const d = await postWash(washChaseBody());
    if (!(d && d.ok)) toast('Wash failed: ' + (d && d.error || 'error'));
  }
  async function washSaveChase() {
    if (!washSeq.length) { toast('Add at least one color step'); return; }
    const v = await formDialog({
      title: 'Save chase to library',
      hint: 'Saves this sequence as a recallable scene',
      ok: 'Save',
      fields: [{ key: 'name', label: 'Name', value: '', placeholder: 'Chase name' }],
    });
    if (v === null || !v.name || !v.name.trim()) return;
    const body = washChaseBody(); body.name = v.name.trim();
    try {
      const r = await fetch('/api/wash/save', {method:'POST',
        headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
      const d = await r.json();
      if (d && d.ok) { toast('Saved "'+d.name+'"'); }
      else toast('Save failed: ' + (d && d.error || 'error'));
    } catch (e) { toast('Save failed'); }
  }
  function washOff() { postWash({off:true}); }

  boot();
</script>
</body>
</html>
