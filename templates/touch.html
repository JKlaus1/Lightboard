<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lightboard Touch</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap');
  :root {
    --bg:       #0a0a0f;
    --surface:  #13131c;
    --border:   #1e1e2e;
    --accent:   #e8630a;
    --accent2:  #f0a500;
    --text:     #d4d4e8;
    --dim:      #555570;
    --blackout: #c0392b;
    --singer:   #8e44ad;
    --master:   #1a6a3a;
    --step:     #1a3a6a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  /* ── Remote control overlay (Art-Net master active, Phase 2) ── */
  #remote-banner {
    position: fixed; inset: 0;
    display: none;
    flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px;
    background: rgba(8, 12, 20, 0.88);
    z-index: 1000;
    text-align: center;
    padding: 20px;
  }
  #remote-banner.on { display: flex; }
  #remote-banner .rb-dot {
    width: 18px; height: 18px; border-radius: 50%;
    background: #4db8ff;
    box-shadow: 0 0 14px #4db8ff;
    animation: rb-pulse 1.2s ease-in-out infinite;
  }
  #remote-banner .rb-title {
    font-size: 26px; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: #4db8ff;
  }
  #remote-banner .rb-sub {
    font-size: 12px; color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 0.05em;
  }
  @keyframes rb-pulse {
    0%, 100% { opacity: 1;    transform: scale(1); }
    50%      { opacity: 0.35; transform: scale(0.75); }
  }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }
  body {
    display: flex;
    flex-direction: column;
    height: 100vh;               /* fallback for old engines */
    height: 100dvh;              /* dynamic viewport: excludes browser chrome */
    padding: 6px;
    gap: 5px;
    /* keep the grid clear of gesture-nav bars on phones */
    padding-bottom: calc(6px + env(safe-area-inset-bottom, 0px));
  }
  /* ── Header ── */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  #show-name {
    font-size: 11px;
    font-family: 'Share Tech Mono', monospace;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  #status-row {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  #status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--dim);
    transition: background 0.3s;
  }
  #status-dot.ok    { background: #27ae60; box-shadow: 0 0 5px #27ae60; }
  #status-dot.error { background: var(--blackout); box-shadow: 0 0 6px var(--blackout); }
  #scene-status {
    font-size: 9px;
    font-family: 'Share Tech Mono', monospace;
    color: var(--dim);
    letter-spacing: 0.06em;
  }
  /* ── Scene grid ── */
  #scene-grid {
    display: grid;
    gap: 5px;
    flex: 1;
    align-content: start;
  }
  .scene-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 0 6px;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    line-height: 1.2;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s, box-shadow 0.1s;
    user-select: none;
    position: relative;
    overflow: hidden;
  }
  .scene-btn::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .scene-btn:active { opacity: 0.75; }
  .scene-btn.active {
    background: #1a1a2e;
    border-color: var(--accent);
    box-shadow: 0 0 10px rgba(232,99,10,0.45);
    color: #fff;
  }
  .scene-btn.active::before { opacity: 1; }

  /* Action button variants */
  .scene-btn.type-blackout {
    background: #2a0a0a;
    border-color: #5a1a1a;
    color: #ff8888;
  }
  .scene-btn.type-blackout.active {
    background: var(--blackout);
    border-color: #e74c3c;
    color: #fff;
    box-shadow: 0 0 12px rgba(192,57,43,0.6);
    animation: pulse-red 1.2s ease-in-out infinite;
  }
  .scene-btn.type-singer {
    background: #1a0a2a;
    border-color: #4a1a6a;
    color: #cc88ff;
  }
  .scene-btn.type-singer.active {
    background: var(--singer);
    border-color: #aa55dd;
    color: #fff;
    box-shadow: 0 0 10px rgba(142,68,173,0.5);
  }
  .scene-btn.type-master-up,
  .scene-btn.type-master-down {
    background: #0a1a0a;
    border-color: #1a4a1a;
    color: #88cc88;
  }
  .scene-btn.type-singer-up,
  .scene-btn.type-singer-down {
    background: #1a0a2a;
    border-color: #4a1a6a;
    color: #cc88ff;
  }
  .scene-btn.type-tempo {
    background: #0a1a2a;
    border-color: #1a3a6a;
    color: #88bbff;
  }
  .scene-btn.type-tempo.active {
    background: var(--step);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 0 10px rgba(232,99,10,0.45);
  }
  .scene-btn.type-tempo-cancel {
    background: #2a0a0a;
    border-color: #5a1a1a;
    color: #ff8888;
  }
  .scene-btn.type-cycler {
    background: #0a2a1a;
    border-color: #1a5a3a;
    color: #88ddaa;
  }
  .scene-btn.type-cycler.active {
    background: var(--master);
    border-color: #2a9a5a;
    color: #fff;
    box-shadow: 0 0 10px rgba(26,106,58,0.55);
    animation: pulse-green 1.2s ease-in-out infinite;
  }

  @keyframes pulse-green {
    0%,100% { box-shadow: 0 0 9px rgba(39,174,96,0.4); }
    50%      { box-shadow: 0 0 20px rgba(39,174,96,0.8); }
  }

  @keyframes pulse-red {
    0%,100% { box-shadow: 0 0 10px rgba(231,76,60,0.4); }
    50%      { box-shadow: 0 0 22px rgba(231,76,60,0.85); }
  }

  /* ── Footer / IP ── */
  #footer {
    flex-shrink: 0;
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 0.06em;
  }
  /* ── Custom faders ── */
  .fader-cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex;
    padding: 4px;
    gap: 4px;
    position: relative;
    user-select: none;
    touch-action: none;
    overflow: hidden;
  }
  .fader-cell.vert  { flex-direction: column; }
  .fader-cell.horiz { flex-direction: row; align-items: stretch; }
  .fader-head {
    display: flex; align-items: center; justify-content: space-between;
    gap: 4px; flex-shrink: 0; min-width: 0;
  }
  .fader-cell.horiz .fader-head {
    flex-direction: column; justify-content: center; max-width: 34%;
  }
  .fader-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .fader-value {
    font-size: 10px; font-family: 'Share Tech Mono', monospace;
    color: var(--dim); flex-shrink: 0;
  }
  .fader-track {
    position: relative; flex: 1;
    background: #0d0d14;
    border: 1px solid var(--border);
    border-radius: 5px;
    overflow: hidden;
    min-height: 44px; min-width: 44px;
  }
  .fader-fill {
    position: absolute; inset: 0;
    background: var(--accent2);
    opacity: 0.85;
    transform-origin: bottom;
  }
  .fader-cell.horiz .fader-fill { transform-origin: left; }
  .fader-cell.mode-override .fader-fill { background: var(--dim); opacity: 0.5; }
  .fader-cell.mode-override.armed .fader-fill { background: var(--blackout); opacity: 0.9; }
  .fader-cell.mode-override.armed {
    border-color: var(--blackout);
    box-shadow: 0 0 10px rgba(192,57,43,0.55);
  }
  .fader-arm {
    flex-shrink: 0;
    background: #1a1a24; border: 1px solid var(--border); border-radius: 5px;
    color: var(--dim);
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
    padding: 6px 8px;
    cursor: pointer;
  }
  .fader-cell.armed .fader-arm {
    background: var(--blackout); border-color: var(--blackout); color: #fff;
  }
</style>
</head>
<body>
<div id="header">
  <div id="show-name">…</div>
  <div id="status-row">
    <div id="scene-status">— no scene active —</div>
    <div id="status-dot"></div>
  </div>
</div>

<div id="scene-grid"></div>
<div id="footer">…</div>

<!-- Remote-mode overlay: shown when a master console streams Art-Net at
     this Pi. Blocks all touches (pointer events land on the overlay) so
     local faders/scenes are visibly and physically bypassed. -->
<div id="remote-banner">
  <div class="rb-dot"></div>
  <div class="rb-title">Remote Control Active</div>
  <div class="rb-sub" id="remote-sub">local controls bypassed</div>
</div>

<script>
  let blackoutOn   = false;
  let singerOn     = false;
  let masterLevel  = 1.0;
  let singerLevel  = 1.0;
  let activeScenes = new Set();
  let gridConfig   = null;

  const STEP = 0.1;

  // ── Boot ─────────────────────────────────────────────────────────────
  async function boot() {
    try {
      const res  = await fetch('/api/touch/config');
      gridConfig = await res.json();
      buildGrid();
      await fetchState();
      document.getElementById('status-dot').className = 'ok';
    } catch(e) {
      document.getElementById('status-dot').className = 'error';
    }
    refreshInfo();
  }

  // ── Footer info (IP + show name) — self-scheduling refresh ─────
  const INFO_REFRESH_MS = 15000;
  async function refreshInfo() {
    try {
      const r = await fetch('/api/touch/info');
      const d = await r.json();
      const ipParts = [];
      if (d.ips && d.ips.wlan0) ipParts.push('WiFi: ' + d.ips.wlan0);
      if (d.ips && d.ips.eth0)  ipParts.push('ETH: ' + d.ips.eth0);
      if (!ipParts.length)      ipParts.push('IP: ' + (d.ip || 'unknown'));
      document.getElementById('footer').textContent =
        ipParts.join('  ·  ') + '  ·  ' + d.show_name;
      document.getElementById('show-name').textContent = d.show_name;
    } catch(e) {}
    finally {
      setTimeout(refreshInfo, INFO_REFRESH_MS);
    }
  }

  // ── Build grid from config ────────────────────────────────────────────
  // WYSIWYG: slot index i maps to a fixed grid position (row ⌊i/cols⌋,
  // col i%cols), so cells land exactly where the builder placed them —
  // gaps included. Faders occupy their full w×h footprint; slots inside a
  // footprint are skipped defensively if anything is stored there.
  function faderFootprint(idx, def, cols, rows) {
    const col = idx % cols, row = Math.floor(idx / cols);
    const w = Math.max(1, Math.min(def.w || 1, cols - col));
    const h = Math.max(1, Math.min(def.h || 1, rows - row));
    const slots = [];
    for (let dr = 0; dr < h; dr++)
      for (let dc = 0; dc < w; dc++)
        slots.push(idx + dr * cols + dc);
    return { col, row, w, h, slots };
  }

  function buildGrid() {
    const grid = document.getElementById('scene-grid');
    grid.innerHTML = '';
    const cols   = gridConfig.cols || 2;
    const rows   = gridConfig.rows || 4;
    const faders = {};
    (gridConfig.faders || []).forEach(f => { faders[f.id] = f; });
    const cells = gridConfig.cells || [];
    grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    grid.style.gridTemplateRows    = `repeat(${rows}, 1fr)`;
    grid.style.alignContent        = 'stretch';

    // Slots covered by a fader footprint (beyond its own anchor slot)
    const covered = new Set();
    cells.forEach((cell, i) => {
      if (!cell || !cell.fader_id || !faders[cell.fader_id]) return;
      faderFootprint(i, faders[cell.fader_id], cols, rows).slots
        .forEach(s => { if (s !== i) covered.add(s); });
    });

    cells.forEach((cell, i) => {
      if (!cell || i >= cols * rows || covered.has(i)) return;
      if (!(cell.scene_id || cell.action || cell.fader_id)) return;
      const col = i % cols, row = Math.floor(i / cols);

      if (cell.fader_id) {
        const def = faders[cell.fader_id];
        if (!def) return;
        const fp = faderFootprint(i, def, cols, rows);
        const el = buildFader(def);
        el.style.gridColumn = (fp.col + 1) + ' / span ' + fp.w;
        el.style.gridRow    = (fp.row + 1) + ' / span ' + fp.h;
        grid.appendChild(el);
        return;
      }
      const btn = document.createElement('button');
      btn.style.gridColumn = String(col + 1);
      btn.style.gridRow    = String(row + 1);
      btn.className = 'scene-btn';
      btn.id = cell.scene_id ? 'scene-' + cell.scene_id : 'action-' + cell.action;

      if (cell.action) {
        btn.classList.add('type-' + cell.action);
        btn.textContent = cell.label || actionLabel(cell.action);
        btn.dataset.baseLabel = btn.textContent;
        btn.onclick = () => doAction(cell.action, btn);
      } else {
        btn.textContent = cell.label || cell.name || cell.scene_id;
        btn.onclick = () => toggleScene(cell.scene_id);
      }
      grid.appendChild(btn);
    });
  }

  function actionLabel(action) {
    const labels = {
      'blackout':    '⬛ Blackout',
      'singer':      '🎤 Singer',
      'master-up':   '🔆 Brighter',
      'master-down': '🔅 Dimmer',
      'singer-up':   '🎤 + Level',
      'singer-down': '🎤 - Level',
      'tempo':        '👆 Tap',
      'tempo-cancel': '✕ Tempo',
      'cycler':       '🔁 Cycler',
    };
    return labels[action] || action;
  }

  // ── Custom faders ─────────────────────────────────────────────────────
  const faderState = {};   // id -> {level, armed, dragging, lastSent, timer}

  function buildFader(def) {
    const vert = (def.orientation || 'vertical') === 'vertical';
    const el = document.createElement('div');
    el.className = 'fader-cell ' + (vert ? 'vert' : 'horiz') +
                   ' mode-' + (def.mode || 'limit');
    el.id = 'fader-' + def.id;
    // placement + span are set by buildGrid (WYSIWYG footprint)

    const st = faderState[def.id] = faderState[def.id] ||
      { level: (def.level !== undefined ? def.level : 1.0), armed: false,
        dragging: false, lastSent: 0, timer: null };

    const head = document.createElement('div');
    head.className = 'fader-head';
    head.innerHTML =
      '<span class="fader-label">' + (def.label || 'FADER') + '</span>' +
      '<span class="fader-value" id="fader-val-' + def.id + '"></span>';
    const track = document.createElement('div');
    track.className = 'fader-track';
    const fill = document.createElement('div');
    fill.className = 'fader-fill';
    fill.id = 'fader-fill-' + def.id;
    track.appendChild(fill);

    el.appendChild(head);
    el.appendChild(track);

    if (def.mode === 'override') {
      const arm = document.createElement('button');
      arm.className = 'fader-arm';
      arm.textContent = 'ARM';
      arm.onclick = (e) => { e.stopPropagation(); toggleArm(def.id); };
      el.appendChild(arm);
    }

    track.addEventListener('pointerdown', e => {
      e.preventDefault();
      track.setPointerCapture(e.pointerId);
      st.dragging = true;
      dragFader(def, track, e, vert);
    });
    track.addEventListener('pointermove', e => {
      if (st.dragging) dragFader(def, track, e, vert);
    });
    const end = () => {
      if (!st.dragging) return;
      st.dragging = false;
      sendFaderLevel(def.id, st.level, true);   // final flush
    };
    track.addEventListener('pointerup', end);
    track.addEventListener('pointercancel', end);

    paintFader(def.id);
    return el;
  }

  function dragFader(def, track, e, vert) {
    const r = track.getBoundingClientRect();
    let lv = vert ? 1 - (e.clientY - r.top) / r.height
                  : (e.clientX - r.left) / r.width;
    lv = Math.max(0, Math.min(1, lv));
    faderState[def.id].level = lv;
    paintFader(def.id);
    sendFaderLevel(def.id, lv, false);
  }

  const FADER_SEND_MS = 50;   // ~20 posts/sec max while dragging
  function sendFaderLevel(id, level, final) {
    const st  = faderState[id];
    const now = Date.now();
    if (!final && now - st.lastSent < FADER_SEND_MS) {
      // trailing send so the last drag position always lands
      clearTimeout(st.timer);
      st.timer = setTimeout(() => sendFaderLevel(id, st.level, true), FADER_SEND_MS);
      return;
    }
    clearTimeout(st.timer);
    st.lastSent = now;
    fetch('/api/touch/fader/' + id + '/level', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({level: level})
    }).catch(() => {});
  }

  async function toggleArm(id) {
    const st = faderState[id];
    st.armed = !st.armed;
    paintFader(id);
    try {
      await fetch('/api/touch/fader/' + id + '/arm', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({armed: st.armed})
      });
    } catch(e) {}
  }

  function paintFader(id) {
    const st   = faderState[id];
    const cell = document.getElementById('fader-' + id);
    const fill = document.getElementById('fader-fill-' + id);
    const val  = document.getElementById('fader-val-' + id);
    if (!st || !cell || !fill) return;
    const vert = cell.classList.contains('vert');
    fill.style.transform = vert ? 'scaleY(' + st.level + ')'
                                : 'scaleX(' + st.level + ')';
    cell.classList.toggle('armed', !!st.armed);
    if (val) val.textContent = Math.round(st.level * 100) + '%';
  }

  // ── Actions ───────────────────────────────────────────────────────────
  async function doAction(action, btn) {
    try {
      if (action === 'blackout') {
        await fetch('/api/blackout', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({mode: 'full'})
        });
        blackoutOn = !blackoutOn;
        btn.classList.toggle('active', blackoutOn);

      } else if (action === 'singer') {
        singerOn = !singerOn;
        await fetch('/api/singer/mode', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({enabled: singerOn})
        });
        btn.classList.toggle('active', singerOn);

      } else if (action === 'master-up') {
        masterLevel = Math.min(1.0, Math.round((masterLevel + STEP) * 10) / 10);
        await fetch('/api/master', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({level: masterLevel})
        });
        flashBtn(btn);

      } else if (action === 'master-down') {
        masterLevel = Math.max(0.0, Math.round((masterLevel - STEP) * 10) / 10);
        await fetch('/api/master', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({level: masterLevel})
        });
        flashBtn(btn);

      } else if (action === 'singer-up') {
        singerLevel = Math.min(1.0, Math.round((singerLevel + STEP) * 10) / 10);
        await fetch('/api/singer/level', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({level: singerLevel})
        });
        flashBtn(btn);

      } else if (action === 'singer-down') {
        singerLevel = Math.max(0.0, Math.round((singerLevel - STEP) * 10) / 10);
        await fetch('/api/singer/level', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({level: singerLevel})
        });
        flashBtn(btn);

      } else if (action === 'tempo') {
        await fetch('/api/tempo/tap', { method: 'POST' });
        flashBtn(btn);

      } else if (action === 'tempo-cancel') {
        await fetch('/api/tempo/cancel', { method: 'POST' });
        flashBtn(btn);

      } else if (action === 'cycler') {
        await fetch('/api/cycler/toggle', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({})
        });
        fetchState();   // reflect new active state promptly
      }
    } catch(e) {}
  }

  function flashBtn(btn) {
    btn.classList.add('active');
    setTimeout(() => btn.classList.remove('active'), 200);
  }

  // ── Toggle scene ──────────────────────────────────────────────────────
  async function toggleScene(id) {
    try {
      if (activeScenes.has(id)) {
        await fetch('/api/stop/' + id, { method: 'POST' });
        activeScenes.delete(id);
      } else {
        await fetch('/api/scene/' + id, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({})
        });
        activeScenes.add(id);
      }
      updateSceneButtons();
    } catch(e) {}
  }

  function updateSceneButtons() {
    document.querySelectorAll('.scene-btn[id^="scene-"]').forEach(btn => {
      const id = btn.id.replace('scene-', '');
      btn.classList.toggle('active', activeScenes.has(id));
    });
    const status = document.getElementById('scene-status');
    status.textContent = activeScenes.size
      ? Array.from(activeScenes).length + ' active'
      : '— no scene active —';
  }

  // ── Poll state ────────────────────────────────────────────────────────
  async function fetchState() {
    try {
      const res  = await fetch('/api/state');
      const data = await res.json();
      activeScenes = new Set(
        (data.scenes || []).filter(s => s && s.id).map(s => s.id)
      );
      blackoutOn  = !!(data.blackout_mode && data.blackout_blend > 0.5);
      masterLevel = data.master_level !== undefined ? data.master_level : masterLevel;
      singerLevel = data.singer_level  !== undefined ? data.singer_level  : singerLevel;
      singerOn    = data.singer_mode === true;
      updateSceneButtons();
      // Sync action button states
      const bo = document.querySelector('.type-blackout');
      if (bo) bo.classList.toggle('active', blackoutOn);
      const so = document.querySelector('.type-singer');
      if (so) so.classList.toggle('active', singerOn);

      // Tempo button: show BPM and light up when a tempo is live
      const t   = data.tempo || {};
      const tEl = document.getElementById('action-tempo');
      if (tEl) {
        const base = tEl.dataset.baseLabel || '👆 Tap';
        if (t.active && t.bpm) {
          tEl.classList.add('active');
          tEl.textContent = '👆 ' + Math.round(t.bpm);
        } else if (t.tapping && t.preview_bpm) {
          tEl.classList.remove('active');
          tEl.textContent = '👆 ' + Math.round(t.preview_bpm) + '…';
        } else {
          tEl.classList.remove('active');
          tEl.textContent = base;
        }
      }
      // Cycler button: active while running
      const cEl = document.getElementById('action-cycler');
      if (cEl) cEl.classList.toggle('active', !!(data.cycler && data.cycler.active));

      // Custom faders: follow server state unless actively dragging
      (data.faders || []).forEach(f => {
        const st = faderState[f.id];
        if (!st || st.dragging) return;
        st.level = f.level;
        st.armed = f.armed;
        paintFader(f.id);
      });

      // Remote mode (Phase 2): full-screen banner while a master console
      // owns the rig; the overlay also swallows all touches.
      const rb = document.getElementById('remote-banner');
      if (rb) {
        const rem = data.remote || {};
        rb.classList.toggle('on', !!rem.active);
        if (rem.active) {
          const sub = document.getElementById('remote-sub');
          if (sub) sub.textContent = 'local controls bypassed — master: '
                                     + (rem.source || 'unknown');
        }
      }
    } catch(e) {}
  }

  setInterval(fetchState, 2000);

  // Poll for config reload signal
  let lastReloadTs = 0;
  async function checkReload() {
    try {
      const r = await fetch('/api/touch/reload');
      const d = await r.json();
      if (d.ts && d.ts !== lastReloadTs && lastReloadTs !== 0) {
        location.reload();
      }
      lastReloadTs = d.ts || 0;
    } catch(e) {}
  }
  setInterval(checkReload, 3000);
  boot();
</script>
</body>
</html>
