<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Touch Screen Config</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg:      #0a0a0f;
    --surface: #13131c;
    --border:  #1e1e2e;
    --accent:  #e8630a;
    --text:    #d4d4e8;
    --dim:     #555570;
    --success: #27ae60;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100dvh;
    padding: 1rem 1rem 3rem;
    max-width: 480px;
    margin: 0 auto;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-size: 0.9rem;
    font-weight: 800;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .hbtn {
    padding: 0.4rem 0.75rem;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 0.72rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .hbtn.accent { background: var(--accent); color: #000; border-color: var(--accent); }

  .label {
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 0.4rem;
  }

  /* Grid size controls */
  .size-row {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1.25rem;
    align-items: center;
  }
  .size-field {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
    flex: 1;
  }
  .size-field input {
    width: 100%;
    padding: 0.5rem 0.75rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 1rem;
    font-weight: 700;
    text-align: center;
    outline: none;
  }
  .size-field input:focus { border-color: var(--accent); }

  /* Grid cells */
  #grid-wrap {
    display: grid;
    gap: 6px;
    margin-bottom: 1.25rem;
  }
  .grid-cell {
    min-height: 52px;
    border: 1.5px dashed var(--border);
    border-radius: 8px;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    padding: 6px;
    position: relative;
    transition: border-color 0.15s, background 0.15s;
  }
  .grid-cell:active { background: #1a1a2e; }
  .grid-cell.filled { border-style: solid; border-color: var(--accent); }
  .grid-cell .cell-name {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    text-align: center;
    line-height: 1.2;
  }
  .grid-cell.filled .cell-name { color: #fff; }
  .grid-cell .cell-type {
    font-size: 0.55rem;
    color: var(--dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .grid-cell .cell-empty {
    font-size: 0.65rem;
    color: var(--dim);
    letter-spacing: 0.08em;
  }
  .grid-cell .clear-btn {
    position: absolute;
    top: 3px; right: 5px;
    background: none;
    border: none;
    color: var(--dim);
    font-size: 0.7rem;
    cursor: pointer;
    padding: 2px 4px;
    line-height: 1;
  }
  .grid-cell .clear-btn:active { color: #e74c3c; }

  /* Save status */
  #save-msg {
    font-size: 0.72rem;
    font-weight: 700;
    text-align: center;
    min-height: 1.2rem;
    letter-spacing: 0.08em;
    margin-bottom: 0.5rem;
  }

  /* Modal */
  .modal-backdrop {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: #13131c;
    border: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    padding: 1rem;
    width: 100%;
    max-width: 480px;
    max-height: 80vh;
    overflow-y: auto;
  }
  .modal h2 {
    font-size: 0.78rem;
    font-weight: 800;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.75rem;
  }
  .modal-btns {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0.75rem;
  }
  .modal-btns button {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    font-size: 0.78rem;
    font-weight: 700;
    cursor: pointer;
  }
  .btn-cancel { background: var(--surface); color: var(--dim); }
  .picker-section {
    margin-bottom: 0.75rem;
  }
  .picker-section-label {
    font-size: 0.58rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 0.4rem;
    padding-bottom: 0.3rem;
    border-bottom: 1px solid var(--border);
  }
  .picker-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.6rem 0.75rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    margin-bottom: 0.35rem;
    cursor: pointer;
    transition: border-color 0.1s, background 0.1s;
  }
  .picker-item:active { background: #1a1a2e; border-color: var(--accent); }
  .picker-item .pname {
    font-size: 0.82rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .picker-item .ptype {
    font-size: 0.6rem;
    color: var(--dim);
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Label editor */
  #label-wrap {
    margin-bottom: 0.75rem;
  }
  #label-input {
    width: 100%;
    padding: 0.55rem 0.75rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.9rem;
    font-weight: 700;
    outline: none;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  #label-input:focus { border-color: var(--accent); }
  /* Fader editor */
  .f-row { display: flex; gap: 0.5rem; margin-bottom: 0.6rem; }
  .f-field { flex: 1; display: flex; flex-direction: column; gap: 0.25rem; }
  .f-field input, .f-field select {
    width: 100%;
    padding: 0.5rem 0.6rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.85rem;
    font-weight: 700;
    outline: none;
  }
  .f-field input:focus, .f-field select:focus { border-color: var(--accent); }
  .check-list {
    max-height: 9.5rem;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.25rem;
    margin-bottom: 0.6rem;
  }
  .check-item {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.45rem 0.5rem;
    font-size: 0.78rem; font-weight: 700;
    border-radius: 6px;
    cursor: pointer;
  }
  .check-item:active { background: #1a1a2e; }
  .check-item input { width: 1.05rem; height: 1.05rem; accent-color: var(--accent); }
  .btn-danger { background: #3a1418; color: #e74c3c; }
  .btn-save   { background: var(--accent); color: #000; }
</style>
</head>
<body>
<header>
  <h1>🎛 Touch Config</h1>
  <div style="display:flex;gap:0.5rem">
    <button class="hbtn" onclick="location.href='/'">← Back</button>
    <button class="hbtn accent" onclick="saveConfig()">Save</button>
  </div>
</header>

<div class="label">Grid Size</div>
<div class="size-row">
  <div class="size-field">
    <div class="label">Columns</div>
    <input type="number" id="cols-input" min="1" max="4" value="2" onchange="rebuildGrid()">
  </div>
  <div class="size-field">
    <div class="label">Rows</div>
    <input type="number" id="rows-input" min="1" max="8" value="4" onchange="rebuildGrid()">
  </div>
</div>

<div class="label">Button Grid — tap a cell to assign</div>
<div id="grid-wrap"></div>

<div id="save-msg"></div>
<button class="hbtn accent" style="width:100%;padding:0.75rem;font-size:0.85rem;" onclick="saveConfig()">Save Configuration</button>

<!-- Picker modal -->
<div class="modal-backdrop" id="modal">
  <div class="modal">
    <h2>Assign Button</h2>

    <div id="label-wrap">
      <div class="label">Custom Label (optional)</div>
      <input type="text" id="label-input" placeholder="Leave blank for default" maxlength="24">
    </div>

    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
    </div>

    <!-- Action buttons section -->
    <div class="picker-section">
      <div class="picker-section-label">⚡ Actions</div>
      <div id="action-list"></div>
    </div>

    <!-- Scenes section -->
    <div class="picker-section">
      <div class="picker-section-label">🎬 Scenes</div>
      <div id="scene-list"></div>
    </div>

    <!-- Faders section -->
    <div class="picker-section">
      <div class="picker-section-label">🎚 Faders</div>
      <div id="fader-list"></div>
    </div>
  </div>
</div>

<!-- Fader editor modal -->
<div class="modal-backdrop" id="fader-modal">
  <div class="modal">
    <h2 id="fader-modal-title">Fader</h2>

    <div class="f-row">
      <div class="f-field">
        <div class="label">Label</div>
        <input type="text" id="f-label" maxlength="24" placeholder="e.g. HOUSE">
      </div>
    </div>

    <div class="f-row">
      <div class="f-field">
        <div class="label">Orientation</div>
        <select id="f-orient">
          <option value="vertical">Vertical</option>
          <option value="horizontal">Horizontal</option>
        </select>
      </div>
      <div class="f-field">
        <div class="label">Mode</div>
        <select id="f-mode">
          <option value="limit">Limit (submaster)</option>
          <option value="override">Override (park)</option>
        </select>
      </div>
    </div>

    <div class="f-row">
      <div class="f-field">
        <div class="label">Width (cols)</div>
        <input type="number" id="f-w" min="1" max="12" value="1">
      </div>
      <div class="f-field">
        <div class="label">Height (rows)</div>
        <input type="number" id="f-h" min="1" max="12" value="1">
      </div>
    </div>

    <div class="f-row">
      <div class="f-field">
        <div class="label">Channels</div>
        <select id="f-chan-mode">
          <option value="intensity">Intensity / dimmer</option>
          <option value="custom">Custom offsets…</option>
        </select>
      </div>
      <div class="f-field" id="f-chan-custom-wrap" style="display:none">
        <div class="label">Offsets (1-indexed, csv)</div>
        <input type="text" id="f-chan-custom" placeholder="e.g. 1,2,3">
      </div>
    </div>

    <div class="label">Target Groups</div>
    <div class="check-list" id="f-groups"></div>

    <div class="label">Target Fixtures</div>
    <div class="check-list" id="f-fixtures"></div>

    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeFaderModal()">Cancel</button>
      <button class="btn-danger" id="f-delete" onclick="deleteFader()">Delete</button>
      <button class="btn-save" onclick="saveFaderDef()">Save Fader</button>
    </div>
  </div>
</div>

<script>
  const ACTIONS = [
    { action: 'blackout',    label: '⬛ Blackout',       type: 'action' },
    { action: 'singer',      label: '🎤 Singer Toggle',  type: 'action' },
    { action: 'master-up',   label: '🔆 Master Brighter', type: 'action' },
    { action: 'master-down', label: '🔅 Master Dimmer',   type: 'action' },
    { action: 'singer-up',   label: '🎤 Singer + Level',  type: 'action' },
    { action: 'singer-down', label: '🎤 Singer - Level',  type: 'action' },
    { action: 'tempo',       label: '👆 Tap Tempo',       type: 'action' },
    { action: 'tempo-cancel',label: '✕ Cancel Tempo',     type: 'action' },
    { action: 'cycler',      label: '🔁 Beat Cycler',     type: 'action' },
  ];

  let cells      = [];
  let scenes     = [];
  let editingIdx = null;
  let faderDefs  = [];        // custom fader definitions
  let fixtures   = [];        // [{id, name}] pickable targets
  let groups     = [];        // [{id, name}]
  let editingFader = null;    // fader id being edited, or null for new

  async function init() {
    try {
      const [cfgRes, sceneRes, fadRes] = await Promise.all([
        fetch('/api/touch/config'),
        fetch('/api/library/scenes'),
        fetch('/api/touch/faders'),
      ]);
      const cfg = await cfgRes.json();
      scenes = await sceneRes.json();
      const fad = await fadRes.json();
      faderDefs = fad.faders   || [];
      fixtures  = fad.fixtures || [];
      groups    = fad.groups   || [];

      document.getElementById('cols-input').value = cfg.cols || 2;
      document.getElementById('rows-input').value = cfg.rows || 4;
      cells = cfg.cells || [];

      const total = (cfg.cols || 2) * (cfg.rows || 4);
      while (cells.length < total) cells.push(null);
      cells = cells.slice(0, total);

      buildGrid();
    } catch(e) {
      document.getElementById('save-msg').textContent = 'Error loading config';
      document.getElementById('save-msg').style.color = '#e74c3c';
    }
  }

  function rebuildGrid() {
    const cols  = parseInt(document.getElementById('cols-input').value) || 2;
    const rows  = parseInt(document.getElementById('rows-input').value) || 4;
    const total = cols * rows;
    while (cells.length < total) cells.push(null);
    cells = cells.slice(0, total);
    buildGrid();
  }

  function gridDims() {
    return {
      cols: parseInt(document.getElementById('cols-input').value) || 2,
      rows: parseInt(document.getElementById('rows-input').value) || 4,
    };
  }

  function faderFootprint(idx, def, cols, rows) {
    const col = idx % cols, row = Math.floor(idx / cols);
    const w = Math.max(1, Math.min(def.w || 1, cols - col));
    const h = Math.max(1, Math.min(def.h || 1, rows - row));
    const slots = [];
    for (let dr = 0; dr < h; dr++)
      for (let dc = 0; dc < w; dc++)
        slots.push(idx + dr * cols + dc);
    return { col, row, w, h, slots };
  }

  // Returns an error string if placing fader `def` with its anchor at slot
  // `idx` won't fit the grid or would overlap other cells; null if OK.
  function placementError(idx, def, selfId) {
    const { cols, rows } = gridDims();
    const col = idx % cols, row = Math.floor(idx / cols);
    const w = def.w || 1, h = def.h || 1;
    if (w > cols - col || h > rows - row)
      return 'Fader is ' + w + '\u00d7' + h + ' and doesn\u2019t fit at this position.';
    const fp = faderFootprint(idx, def, cols, rows);
    const blockers = [];
    fp.slots.forEach(s => {
      if (s === idx) return;
      const c = cells[s];
      if (c && c.fader_id !== selfId)
        blockers.push(c.label || c.name || c.action || ('cell ' + (s + 1)));
    });
    // other faders' footprints overlapping ours
    cells.forEach((c, i) => {
      if (!c || !c.fader_id || i === idx || c.fader_id === selfId) return;
      const d = faderDefs.find(x => x.id === c.fader_id);
      if (!d) return;
      if (faderFootprint(i, d, cols, rows).slots.some(s => fp.slots.includes(s)))
        blockers.push(c.name || c.fader_id);
    });
    if (blockers.length)
      return 'Overlaps: ' + Array.from(new Set(blockers)).join(', ') +
             '. Clear those cells first.';
    return null;
  }

  function buildGrid() {
    const { cols, rows } = gridDims();
    const wrap = document.getElementById('grid-wrap');
    wrap.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    wrap.style.gridTemplateRows    = `repeat(${rows}, minmax(52px, auto))`;
    wrap.innerHTML = '';
    const fadersById = {};
    faderDefs.forEach(f => { fadersById[f.id] = f; });

    // Slots covered by fader footprints (beyond their anchor slot)
    const covered = new Set();
    cells.forEach((cell, i) => {
      if (cell && cell.fader_id && fadersById[cell.fader_id])
        faderFootprint(i, fadersById[cell.fader_id], cols, rows).slots
          .forEach(s => { if (s !== i) covered.add(s); });
    });

    cells.forEach((cell, i) => {
      if (covered.has(i)) return;   // inside a fader's footprint
      const el = document.createElement('div');
      el.className = 'grid-cell' + (cell ? ' filled' : '');
      el.onclick = () => openModal(i);
      el.style.gridColumn = String((i % cols) + 1);
      el.style.gridRow    = String(Math.floor(i / cols) + 1);

      if (cell) {
        let typeLabel = cell.fader_id ? 'fader'  :
                        cell.action   ? 'action' :
                        cell.scene_type === 'effect' ? 'effect' :
                        cell.scene_type === 'mover_motion' ? 'motion' :
                        cell.scene_type === 'mover_look'   ? 'look'   : 'scene';
        if (cell.fader_id && fadersById[cell.fader_id]) {
          const d  = fadersById[cell.fader_id];
          const fp = faderFootprint(i, d, cols, rows);
          el.style.gridColumn = (fp.col + 1) + ' / span ' + fp.w;
          el.style.gridRow    = (fp.row + 1) + ' / span ' + fp.h;
          typeLabel = 'fader \u00b7 ' + fp.w + '\u00d7' + fp.h + ' \u00b7 ' + d.mode;
        }
        el.innerHTML = `
          <span class="cell-name">${cell.label || cell.name || cell.action || ''}</span>
          <span class="cell-type">${typeLabel}</span>
          <button class="clear-btn" onclick="event.stopPropagation();clearCell(${i})">✕</button>`;
      } else {
        el.innerHTML = `<span class="cell-empty">tap to assign</span>`;
      }
      wrap.appendChild(el);
    });
  }

  function clearCell(i) {
    cells[i] = null;
    buildGrid();
  }

  function openModal(i) {
    editingIdx = i;
    document.getElementById('label-input').value = cells[i]?.label || '';

    // Build action list
    const actionList = document.getElementById('action-list');
    actionList.innerHTML = '';
    ACTIONS.forEach(a => {
      const el = document.createElement('div');
      el.className = 'picker-item';
      el.innerHTML = `<span class="pname">${a.label}</span><span class="ptype">action</span>`;
      el.onclick = () => assignAction(a);
      actionList.appendChild(el);
    });

    // Clear option
    const clearEl = document.createElement('div');
    clearEl.className = 'picker-item';
    clearEl.innerHTML = `<span class="pname" style="color:var(--dim)">— Clear slot —</span>`;
    clearEl.onclick = () => { cells[editingIdx] = null; closeModal(); buildGrid(); };
    actionList.appendChild(clearEl);

    // Build scene list
    const sceneList = document.getElementById('scene-list');
    sceneList.innerHTML = '';
    scenes.forEach(scene => {
      const typeLabel = scene.scene_type === 'effect' ? 'effect' :
                        scene.scene_type === 'mover_motion' ? 'motion' :
                        scene.scene_type === 'mover_look'   ? 'look'   : 'scene';
      const el = document.createElement('div');
      el.className = 'picker-item';
      el.innerHTML = `<span class="pname">${scene.name || scene.id}</span><span class="ptype">${typeLabel}</span>`;
      el.onclick = () => assignScene(scene);
      sceneList.appendChild(el);
    });

    // Build fader list
    const faderList = document.getElementById('fader-list');
    faderList.innerHTML = '';
    faderDefs.forEach(f => {
      const el = document.createElement('div');
      el.className = 'picker-item';
      el.innerHTML = '<span class="pname">🎚 ' + (f.label || f.id) + '</span>' +
                     '<span class="ptype">' + f.mode + ' · edit ✎</span>';
      el.onclick = () => assignFader(f);
      // long-ish tap alternative: the ✎ side opens the editor
      el.querySelector('.ptype').onclick = (e) => {
        e.stopPropagation();
        openFaderModal(f.id);
      };
      faderList.appendChild(el);
    });
    const newEl = document.createElement('div');
    newEl.className = 'picker-item';
    newEl.innerHTML = '<span class="pname" style="color:var(--accent)">＋ New fader…</span>';
    newEl.onclick = () => openFaderModal(null);
    faderList.appendChild(newEl);

    document.getElementById('modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    editingIdx = null;
  }

  function assignAction(a) {
    const customLabel = document.getElementById('label-input').value.trim().toUpperCase();
    cells[editingIdx] = {
      action: a.action,
      name:   a.label,
      label:  customLabel || '',
    };
    closeModal();
    buildGrid();
  }

  function assignScene(scene) {
    const customLabel = document.getElementById('label-input').value.trim().toUpperCase();
    cells[editingIdx] = {
      scene_id:   scene.id,
      name:       scene.name || scene.id,
      label:      customLabel || '',
      scene_type: scene.scene_type,
    };
    closeModal();
    buildGrid();
  }

  function assignFader(f) {
    const err = placementError(editingIdx, f, f.id);
    if (err) { alert(err); return; }
    cells[editingIdx] = { fader_id: f.id, name: f.label || f.id };
    closeModal();
    buildGrid();
  }

  // ── Fader editor ──────────────────────────────────────────────────────
  function openFaderModal(fid) {
    editingFader = fid;
    const f = fid ? faderDefs.find(x => x.id === fid) : null;
    document.getElementById('fader-modal-title').textContent =
      f ? 'Edit Fader' : 'New Fader';
    document.getElementById('f-label').value  = f ? (f.label || '') : '';
    document.getElementById('f-orient').value = f ? (f.orientation || 'vertical') : 'vertical';
    document.getElementById('f-mode').value   = f ? (f.mode || 'limit') : 'limit';
    document.getElementById('f-w').value      = f ? (f.w || 1) : 1;
    document.getElementById('f-h').value      = f ? (f.h || 1) : 1;
    const custom = f && Array.isArray(f.channels);
    document.getElementById('f-chan-mode').value  = custom ? 'custom' : 'intensity';
    document.getElementById('f-chan-custom').value = custom ? f.channels.join(',') : '';
    updateChanCustomVis();
    buildCheckList('f-groups',   groups,   f ? (f.targets?.groups   || []) : []);
    buildCheckList('f-fixtures', fixtures, f ? (f.targets?.fixtures || []) : []);
    document.getElementById('f-delete').style.display = f ? '' : 'none';
    document.getElementById('fader-modal').classList.add('open');
  }

  function updateChanCustomVis() {
    document.getElementById('f-chan-custom-wrap').style.display =
      document.getElementById('f-chan-mode').value === 'custom' ? '' : 'none';
  }
  document.getElementById('f-chan-mode').addEventListener('change', updateChanCustomVis);

  function buildCheckList(elId, items, selected) {
    const wrap = document.getElementById(elId);
    wrap.innerHTML = '';
    if (!items.length) {
      wrap.innerHTML = '<div class="check-item" style="color:var(--dim)">— none in show —</div>';
      return;
    }
    items.forEach(it => {
      const row = document.createElement('label');
      row.className = 'check-item';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.value = it.id;
      cb.checked = selected.includes(it.id);
      row.appendChild(cb);
      row.appendChild(document.createTextNode(it.name || it.id));
      wrap.appendChild(row);
    });
  }

  function checkedIds(elId) {
    return Array.from(document.querySelectorAll('#' + elId + ' input:checked'))
                .map(cb => cb.value);
  }

  function saveFaderDef() {
    const label = document.getElementById('f-label').value.trim().toUpperCase();
    let channels = 'intensity';
    if (document.getElementById('f-chan-mode').value === 'custom') {
      const nums = document.getElementById('f-chan-custom').value
        .split(',').map(s => parseInt(s.trim(), 10))
        .filter(n => !isNaN(n) && n >= 1);
      if (nums.length) channels = nums;
    }
    const def = {
      id:          editingFader || ('f_' + Math.random().toString(36).slice(2, 9)),
      label:       label,
      orientation: document.getElementById('f-orient').value,
      mode:        document.getElementById('f-mode').value,
      w:           parseInt(document.getElementById('f-w').value, 10) || 1,
      h:           parseInt(document.getElementById('f-h').value, 10) || 1,
      channels:    channels,
      targets: {
        groups:   checkedIds('f-groups'),
        fixtures: checkedIds('f-fixtures'),
      },
      level: 1.0,
    };
    // If this fader is already placed, make sure the (possibly resized)
    // footprint still fits and doesn't overlap anything.
    const anchorIdx = cells.findIndex(c => c && c.fader_id === def.id);
    if (anchorIdx >= 0) {
      const err = placementError(anchorIdx, def, def.id);
      if (err) { alert('Can\u2019t save: ' + err); return; }
    }
    const idx = faderDefs.findIndex(x => x.id === def.id);
    if (idx >= 0) {
      def.level = faderDefs[idx].level !== undefined ? faderDefs[idx].level : 1.0;
      faderDefs[idx] = def;
    } else {
      faderDefs.push(def);
    }
    // Refresh any grid-cell names pointing at this fader
    cells.forEach((c, i) => {
      if (c && c.fader_id === def.id) cells[i] = { fader_id: def.id, name: def.label || def.id };
    });
    closeFaderModal();
    // If we came here from an empty cell's "New fader…", assign it now
    if (editingIdx !== null && (!cells[editingIdx] || !cells[editingIdx].fader_id)) {
      assignFader(def);
    } else {
      buildGrid();
      if (document.getElementById('modal').classList.contains('open')) closeModal();
    }
  }

  function deleteFader() {
    if (!editingFader) return;
    faderDefs = faderDefs.filter(x => x.id !== editingFader);
    cells.forEach((c, i) => { if (c && c.fader_id === editingFader) cells[i] = null; });
    closeFaderModal();
    closeModal();
    buildGrid();
  }

  function closeFaderModal() {
    document.getElementById('fader-modal').classList.remove('open');
    editingFader = null;
  }

  document.getElementById('fader-modal').addEventListener('click', function(e) {
    if (e.target === this) closeFaderModal();
  });

  async function saveConfig() {
    const cols    = parseInt(document.getElementById('cols-input').value) || 2;
    const rows    = parseInt(document.getElementById('rows-input').value) || 4;
    const payload = { cols, rows, cells };
    const msg     = document.getElementById('save-msg');
    try {
      // Save fader definitions first so the grid's fader_id refs resolve
      await fetch('/api/touch/faders', {
        method:  'POST',
        headers: {'Content-Type': 'application/json'},
        body:    JSON.stringify({ faders: faderDefs }),
      });
      const r = await fetch('/api/touch/config', {
        method:  'POST',
        headers: {'Content-Type': 'application/json'},
        body:    JSON.stringify(payload),
      });
      const d = await r.json();
      if (d.ok) {
        msg.textContent  = '✓ Saved — reloading display…';
        msg.style.color  = 'var(--success)';
        // Signal kiosk to reload
        await fetch('/api/touch/reload', { method: 'POST' });
      } else {
        msg.textContent  = 'Error saving';
        msg.style.color  = '#e74c3c';
      }
    } catch(e) {
      msg.textContent = 'Connection error';
      msg.style.color = '#e74c3c';
    }
    setTimeout(() => { msg.textContent = ''; }, 3000);
  }

  // Close modal on backdrop click
  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  init();
</script>
</body>
</html>
