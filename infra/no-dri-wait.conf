[Unit]
# This Pi drives an MHS 3.5" SPI framebuffer, so the KMS GPU device nodes
# /dev/dri/card0 and /dev/dri/renderD128 never appear. Upstream lightdm.service
# Wants/After those devices, so it sat through systemd's 90s device timeout on
# every boot. Resetting Wants drops the device pull; rebuilding After keeps the
# real ordering (user sessions, plymouth-quit) without the GPU nodes.
#
# If you later re-enable vc4-kms-v3d (e.g. moving to a DSI/KMS display),
# remove this file so lightdm again waits for the now-present GPU.
Wants=
After=
After=systemd-user-sessions.service plymouth-quit.service
